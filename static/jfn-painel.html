<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JFN — Central de Inteligência</title>
<style>
  /* ── Design system JFN v4 "sala de comando" ───────────────────────────
     Evolução do v3: telemetria mono, HUD discreto (cantoneiras/scan), LEDs
     de status por fonte. Elevação por LUZ; cor saturada só com SIGNIFICADO.
     Paleta de dados validada (CVD ΔE≥15, contraste ≥3:1 sobre --card).    */
  :root{
    /* JFN design system — OKLCH, dark, "Apple-elegante com alma Jarvis" (ver DESIGN.md).
       Neutros tintados na hue do acento (frio 240), chroma baixíssimo; 1 acento com significado. */
    --bg:oklch(0.16 0.015 240); --bg2:oklch(0.185 0.016 240);
    --card:oklch(0.225 0.017 240); --card2:oklch(0.205 0.016 240); --raise:oklch(0.265 0.018 240);
    --bd:oklch(0.40 0.02 240 / .55); --bd2:oklch(0.36 0.018 240 / .32); --glass:oklch(0.185 0.016 240 / .78);
    --tx:oklch(0.97 0.006 240); --tx2:oklch(0.84 0.012 240); --mut:oklch(0.70 0.015 240); --dim:oklch(0.58 0.014 240);
    --blue:oklch(0.70 0.11 245); --teal-d:oklch(0.68 0.10 190); --amber-d:oklch(0.66 0.11 72); --green-d:oklch(0.66 0.12 158);
    --violet:oklch(0.72 0.11 285); --rose-d:oklch(0.62 0.15 18);
    --accent:oklch(0.82 0.12 188); --accent2:oklch(0.72 0.11 285); --teal:oklch(0.82 0.12 188); --gold:oklch(0.83 0.10 85);
    --green:oklch(0.80 0.14 158); --amber:oklch(0.80 0.13 72); --rose:oklch(0.72 0.17 18); --purple:oklch(0.76 0.10 285);
    --accent-ink:oklch(0.22 0.05 195);
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --r:13px; --r2:16px;
    --sh:0 1px 0 oklch(1 0 0 / .03) inset, 0 18px 40px -32px oklch(0.10 0.02 240 / .9);
    /* escala de espaçamento (ritmo, não gap único) */
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1100px 560px at 88% -14%, rgba(66,135,230,.11), transparent 60%),
      radial-gradient(900px 480px at -12% 6%, rgba(79,214,196,.05), transparent 55%),
      linear-gradient(180deg,var(--bg2),var(--bg) 320px);
    color:var(--tx); font:14.5px/1.6 "Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  .num,td,th,.kpi .v,.mini .b .v{font-variant-numeric:tabular-nums}
  .mono{font-family:var(--mono)}
  .wrap{max-width:1220px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;z-index:2}
  /* ── ambiente cockpit em TODO o painel ── */
  #netbg{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none}
  .aura{position:fixed;z-index:0;pointer-events:none;filter:blur(100px);border-radius:50%;will-change:transform}
  .aura.a{width:58vw;height:58vw;left:-16vw;top:-24vw;background:radial-gradient(circle,#0e6360,transparent 68%);opacity:.32;animation:auraA 28s ease-in-out infinite alternate}
  .aura.b{width:52vw;height:52vw;right:-18vw;bottom:-24vw;background:radial-gradient(circle,#5f3d12,transparent 70%);opacity:.26;animation:auraB 34s ease-in-out infinite alternate}
  @keyframes auraA{to{transform:translate(6vw,4vw) scale(1.12)}}
  @keyframes auraB{to{transform:translate(-5vw,-3vw) scale(1.1)}}
  .veilbg{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 90% at 50% 0%,transparent 58%,rgba(3,6,12,.55) 100%)}
  /* ── cockpit home (aba Início) ── */
  .ck{position:relative}
  .ck-hero{position:relative;overflow:hidden;border:1px solid rgba(120,220,230,.16);border-radius:22px;padding:clamp(20px,3.6vw,38px);
    background:linear-gradient(135deg,rgba(63,224,208,.05),rgba(243,195,86,.03) 60%,rgba(255,255,255,.012));
    backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px)}
  .ck-hero::before{content:"";position:absolute;inset:0;border-radius:22px;padding:1.3px;
    background:conic-gradient(from var(--ang,0deg),transparent 0 62%,rgba(90,230,215,.55) 74%,rgba(243,195,86,.5) 82%,transparent 92%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;animation:ckorbit 9s linear infinite}
  @property --ang{syntax:'<angle>';inherits:false;initial-value:0deg}
  @keyframes ckorbit{to{--ang:360deg}}
  .ck-eye{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--teal);text-transform:uppercase}
  .ck-big{font-family:var(--mono);font-weight:700;line-height:1;letter-spacing:-1px;font-size:clamp(42px,8vw,86px);color:var(--gold);
    text-shadow:0 0 30px rgba(232,189,114,.28);font-variant-numeric:tabular-nums;margin:6px 0 4px}
  .ck-sub{color:var(--mut);font-size:14px;max-width:60ch;line-height:1.55}.ck-sub b{color:var(--tx)}
  .ck-ved{margin-top:16px;display:inline-flex;flex-wrap:wrap;align-items:baseline;gap:8px 14px;padding:11px 16px;border:1px solid rgba(255,92,120,.3);border-radius:13px;background:rgba(255,92,120,.06)}
  .ck-ved .n{font-family:var(--mono);font-weight:700;font-size:24px;color:var(--rose,#ff5c78);font-variant-numeric:tabular-nums}
  .ck-ved .l{font-size:12.5px;color:var(--mut);max-width:46ch;line-height:1.45}
  .ck-grid{margin-top:16px;display:grid;gap:13px;grid-template-columns:repeat(auto-fill,minmax(224px,1fr));perspective:1000px}
  .ck-inst{position:relative;border:1px solid rgba(120,220,230,.16);border-radius:15px;padding:16px;cursor:pointer;
    background:rgba(180,240,245,.045);backdrop-filter:blur(11px);transition:border-color .3s,box-shadow .3s,transform .12s;transform-style:preserve-3d}
  .ck-inst:hover{border-color:rgba(90,230,215,.5);box-shadow:0 16px 42px -20px rgba(63,224,208,.45)}
  .ck-inst .k{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ck-inst .lab{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase}
  .ck-inst .val{font-family:var(--mono);font-weight:700;font-size:31px;line-height:1;margin-top:10px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .ck-inst .meta{margin-top:6px;font-size:12px;color:var(--mut);line-height:1.4}.ck-inst .meta b{color:var(--tx)}
  .ck-inst .dot{width:8px;height:8px;border-radius:50%;position:relative;margin-top:3px}
  .ck-inst .dot::after{content:"";position:absolute;inset:0;border-radius:50%;background:inherit;animation:ckblip 2.8s ease-out infinite}
  @keyframes ckblip{0%{transform:scale(1);opacity:.7}70%{transform:scale(3);opacity:0}100%{opacity:0}}
  .ck-inst .spk{margin-top:11px;height:32px;width:100%;display:block}
  .ck-ticker{margin:14px 0;height:32px;overflow:hidden;position:relative;border:1px solid rgba(120,220,230,.16);border-radius:11px;
    background:rgba(63,224,208,.03);display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}
  .ck-ticker .lane{display:inline-flex;gap:32px;white-space:nowrap;padding-left:100%;font-family:var(--mono);font-size:12px;color:var(--mut);animation:cktick 48s linear infinite}
  .ck-ticker .lane span b{color:var(--tx)} .ck-ticker .lane span.a b{color:var(--rose,#ff5c78)} .ck-ticker .lane span.g b{color:var(--gold)}
  .ck-ticker:hover .lane{animation-play-state:paused}
  @keyframes cktick{to{transform:translateX(-100%)}}
  .ckteal{color:var(--teal)}.ckgold{color:var(--gold)}.ckgood{color:#3fe08a}.ckamber{color:#f5a623}.ckrose{color:#ff5c78}
  .bgteal{background:var(--teal)}.bggood{background:#3fe08a}.bgamber{background:#f5a623}.bgrose{background:#ff5c78}.bggold{background:var(--gold)}
  .ck-fontes{margin-top:18px}
  .ck-flabel{font-family:var(--mono);font-size:10.5px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:9px}
  .ck-fgrid{display:flex;flex-wrap:wrap;gap:8px}
  .ck-fchip{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid rgba(120,220,230,.14);border-radius:20px;
    background:rgba(255,255,255,.015);font-family:var(--mono);font-size:11.5px;color:var(--mut)}
  .ck-fchip .fled{width:8px;height:8px;border-radius:50%;flex:0 0 auto;animation:ckblip 3s ease-out infinite}
  .ck-fchip .fnm{color:var(--tx2)} .ck-fchip .fage{color:var(--dim)}
  @media (prefers-reduced-motion:reduce){#netbg{opacity:.28}.aura,.ck-hero::before,.ck-inst .dot::after,.ck-ticker .lane,.ck-fchip .fled{animation:none!important}}

  header{position:sticky;top:0;z-index:20;background:var(--glass);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd2);position:sticky;overflow:hidden}
  header::after{content:"";position:absolute;left:0;right:0;top:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(79,214,196,.6),rgba(110,168,255,.6),transparent);
    animation:scan 7s linear infinite;opacity:.55;pointer-events:none}
  @keyframes scan{0%{transform:translateX(-60%)}100%{transform:translateX(60%)}}
  .htop{display:flex;align-items:center;gap:12px;padding:13px 18px 11px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:.3px}
  .brand .lg{font-size:19px;filter:drop-shadow(0 0 10px rgba(79,214,196,.6))}
  .brand small{display:block;color:var(--mut);font-size:10px;font-weight:600;margin-top:2px;letter-spacing:.9px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw;font-family:var(--mono)}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:650;color:var(--teal);border:1px solid rgba(79,214,196,.25);padding:3px 10px;border-radius:20px;background:rgba(14,168,149,.07);white-space:nowrap;flex:0 0 auto;font-family:var(--mono)}
  .live .pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pl 1.8s infinite}
  @keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
  .htop .actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .htop a.sair,.htop a.ctrl,.htop a.help,.htop a.cockpit{font-size:12.5px;text-decoration:none;border:1px solid var(--bd);padding:6px 12px;border-radius:9px;transition:.15s;color:var(--mut);cursor:pointer}
  .htop a.ctrl{color:var(--rose);border-color:rgba(229,83,122,.3)}
  .htop a.help{color:var(--accent);border-color:rgba(110,168,255,.28)}
  .htop a.cockpit{color:#3fe0d0;border-color:rgba(63,224,208,.35);font-weight:600;letter-spacing:.3px}
  .htop a.cockpit:hover{color:#fff;border-color:#3fe0d0;box-shadow:0 0 14px -2px rgba(63,224,208,.5);background:rgba(63,224,208,.08)}
  .htop a.sair:hover,.htop a.help:hover{color:#fff;border-color:var(--accent)}
  .spheres{display:flex;gap:7px;padding:0 14px 13px;overflow-x:auto;scrollbar-width:none}
  .spheres::-webkit-scrollbar{display:none}
  .sph{flex:1;min-width:118px;display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 12px;border-radius:12px;cursor:pointer;position:relative;
    border:1px solid var(--bd2);background:linear-gradient(180deg,var(--card),var(--card2));color:var(--mut);font-weight:650;font-size:13.5px;transition:.16s}
  .sph:hover{border-color:var(--bd);color:var(--tx2)}
  .sph .i{font-size:16px}
  .sph.on{color:#fff;border-color:transparent}
  .sph.on.estado{background:linear-gradient(140deg,#17305f,#1d4a85);box-shadow:0 0 0 1px rgba(110,168,255,.38),0 12px 28px -18px #1d4a85}
  .sph.on.prefeitura{background:linear-gradient(140deg,#5c3f12,#7d5c17);box-shadow:0 0 0 1px rgba(232,189,114,.38),0 12px 28px -18px #7d5c17}
  .sph.on.geral{background:linear-gradient(140deg,#33255f,#463683);box-shadow:0 0 0 1px rgba(179,161,255,.38),0 12px 28px -18px #463683}
  .sph .c{font-size:10.5px;opacity:.85;font-weight:550}
  @media (max-width:600px){
    .sph{min-width:0;flex-direction:column;gap:4px;padding:9px 6px;text-align:center}
    .sph .c{display:none}
    .live{display:none}
    .htop{gap:8px;padding:12px 14px 10px}
    .htop a.sair,.htop a.ctrl,.htop a.help,.htop a.cockpit{padding:6px 9px;font-size:12px;white-space:nowrap}
    .brand small{max-width:38vw}
  }

  main{flex:1;padding:18px 16px 112px}
  /* cover HUD: grade + cantoneiras */
  .cover{border-radius:var(--r2);padding:19px 19px 17px;margin-bottom:16px;border:1px solid var(--bd2);position:relative;overflow:hidden}
  .cover::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:linear-gradient(rgba(148,170,215,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(148,170,215,.05) 1px,transparent 1px);
    background-size:26px 26px;mask-image:radial-gradient(400px 160px at 85% 0%,#000,transparent)}
  .cover::before{content:"";position:absolute;inset:10px;pointer-events:none;border-radius:10px;
    background:
      linear-gradient(90deg,rgba(79,214,196,.5) 14px,transparent 14px) top left/28px 1.5px no-repeat,
      linear-gradient(180deg,rgba(79,214,196,.5) 14px,transparent 14px) top left/1.5px 28px no-repeat,
      linear-gradient(270deg,rgba(79,214,196,.35) 14px,transparent 14px) bottom right/28px 1.5px no-repeat,
      linear-gradient(0deg,rgba(79,214,196,.35) 14px,transparent 14px) bottom right/1.5px 28px no-repeat;opacity:.7}
  .cover.estado{background:linear-gradient(135deg,rgba(29,74,133,.30),rgba(13,19,33,.65))}
  .cover.prefeitura{background:linear-gradient(135deg,rgba(125,92,23,.26),rgba(13,19,33,.65))}
  .cover.geral{background:linear-gradient(135deg,rgba(70,54,131,.28),rgba(13,19,33,.65))}
  .cover .t{font-size:1.5rem;font-weight:750;letter-spacing:-.02em;line-height:1.2;text-wrap:balance}
  .cover .s{color:var(--tx2);font-size:13px;margin-top:4px;max-width:680px;line-height:1.55}
  .cover .ic{position:absolute;right:8px;top:-6px;font-size:78px;opacity:.09}

  h2.sec{margin:8px 0 12px;font-size:11px;font-weight:750;letter-spacing:1.1px;text-transform:uppercase;color:var(--mut);display:flex;align-items:center;gap:10px;font-family:var(--mono)}
  h2.sec::before{content:"";width:3px;height:13px;border-radius:3px;background:linear-gradient(var(--teal),var(--blue))}
  h2.sec .cnt{margin-left:auto;color:var(--dim);font-weight:600;letter-spacing:.3px;text-transform:none;font-size:11.5px}
  .lead{color:var(--mut);font-size:13px;margin:-4px 0 14px;max-width:720px}

  .grid{display:grid;gap:11px;min-width:0}
  .g2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--bd2);border-radius:var(--r);padding:15px 16px;min-width:0;box-shadow:var(--sh);transition:transform .2s cubic-bezier(.2,.7,.2,1),border-color .2s,box-shadow .2s;position:relative}
  .card:hover{border-color:color-mix(in oklch,var(--accent) 42%,transparent);box-shadow:0 0 0 1px color-mix(in oklch,var(--accent) 12%,transparent),var(--sh)}
  .card.hl{border-color:rgba(229,83,122,.32)}
  /* ── VIDA GLOBAL: toda aba herda o cockpit (cascata · malha · pulso · contagem) ── */
  #view{position:relative}
  #view .fade{position:relative;z-index:1}
  .view-wire{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.9}
  /* entrada = crossfade curto (estado: conteúdo carregou), não espetáculo orquestrado */
  .rise{opacity:0;animation:rise .34s cubic-bezier(.2,.7,.2,1) both;animation-delay:var(--d,0ms)}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .kpi.rise::after,.card.beat::after{content:"";position:absolute;inset:-1px;border-radius:inherit;pointer-events:none;
    box-shadow:0 0 0 1px rgba(79,214,196,.0);animation:beat 1.7s ease-out}
  @keyframes beat{0%{box-shadow:0 0 0 1px rgba(79,214,196,.42),0 0 22px -4px rgba(79,214,196,.55)}100%{box-shadow:0 0 0 1px rgba(79,214,196,0),0 0 0 rgba(79,214,196,0)}}
  .kpi .v.counting{color:var(--teal)}
  @media (prefers-reduced-motion:reduce){.rise{animation:none;opacity:1}.view-wire{opacity:.5}.card.beat::after,.kpi.rise::after{animation:none}}
  .kpi{position:relative;overflow:hidden}
  /* KPI sem side-stripe (banido); destaque por peso/cor semântica do valor */
  .kpi .l{color:var(--mut);font-size:10.5px;font-weight:650;letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono)}
  .kpi .v{font-size:1.375rem;font-weight:700;letter-spacing:-.3px;line-height:1.15;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
  .kpi .gl{position:absolute;right:-8px;top:-10px;font-size:38px;opacity:.08}
  .kv{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd2);font-size:14px}
  .kv:first-child{padding-top:2px}.kv:last-child{border-bottom:0;padding-bottom:2px}
  .kv .k{color:var(--mut)}.kv b{font-weight:650;color:#fff}
  .muted{color:var(--mut)} .dim{color:var(--dim);font-size:12px} .right{text-align:right}
  .card .right{white-space:nowrap;flex:0 0 auto}
  code{font:12px/1.4 var(--mono);color:#9fc4ff;background:rgba(91,157,255,.09);padding:1px 6px;border-radius:6px}

  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;padding:3px 9px;border-radius:20px;white-space:nowrap;border:1px solid transparent}
  .tag.accent{background:rgba(66,135,230,.13);color:#9fc4ff;border-color:rgba(110,168,255,.18)}
  .tag.rose{background:rgba(229,83,122,.13);color:#ff92ac;border-color:rgba(255,125,156,.2)}
  .tag.amber{background:rgba(198,127,28,.14);color:#eebf7a;border-color:rgba(232,169,79,.2)}
  .tag.purple{background:rgba(143,123,240,.13);color:#c3b3ff;border-color:rgba(179,161,255,.2)}
  .tag.green{background:rgba(42,174,98,.13);color:#7ade9f;border-color:rgba(95,208,141,.2)}
  .tag.teal{background:rgba(14,168,149,.13);color:#5fd9c8;border-color:rgba(79,214,196,.2)}
  .sev{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:7px;flex:0 0 auto}
  .sev.alta{background:rgba(229,83,122,.16);color:#ff92ac}.sev.media{background:rgba(198,127,28,.16);color:#eebf7a}.sev.baixa{background:rgba(139,154,188,.14);color:#b0bcd8}

  /* LEDs de frescor por fonte */
  .fresh{display:flex;flex-direction:column;gap:0}
  .fresh .f{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd2);font-size:13px}
  .fresh .f:last-child{border-bottom:0}
  .fresh .led{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .fresh .ok{background:var(--green);box-shadow:0 0 7px rgba(95,208,141,.7)}
  .fresh .atencao{background:var(--amber);box-shadow:0 0 7px rgba(232,169,79,.7)}
  .fresh .critico{background:var(--rose);box-shadow:0 0 7px rgba(255,125,156,.8);animation:pl 1.4s infinite}
  .fresh .nome{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fresh .idade{font-family:var(--mono);font-size:11.5px;color:var(--mut);white-space:nowrap}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;text-align:right;padding:0 0 9px;font-weight:700;font-family:var(--mono)}
  thead th:first-child{text-align:left}
  tbody td{padding:9px 0;border-bottom:1px solid var(--bd2);text-align:right;vertical-align:top}
  tbody td:first-child{text-align:left;color:var(--tx)}
  tbody tr:last-child td{border-bottom:0}
  th.srt{cursor:pointer;user-select:none}th.srt:hover{color:var(--accent)}

  .barw{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  .barw .row{display:grid;grid-template-columns:1fr auto;gap:8px;font-size:13px}
  .barw .lab{color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

      <span class="actions"><a class="help" onclick="glossario()">ⓘ Termos</a><a class="ctrl" href="/controle">🛡️ Controle</a><a class="sair" href="/logout_jfn">Sair</a></span>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtN=n=>(n==null?'—':Number(n).toLocaleString('pt-BR'));
const fmtR=v=>'R$ '+(v==null?'0,00':Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}));
const fmtRc=v=>{v=Number(v||0);const a=Math.abs(v);
  if(a>=1e9)return 'R$ '+(v/1e9).toLocaleString('pt-BR',{maximumFractionDigits:1})+' bi';
  if(a>=1e6)return 'R$ '+(v/1e6).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mi';
  if(a>=1e3)return 'R$ '+(v/1e3).toLocaleString('pt-BR',{maximumFractionDigits:0})+' mil';return fmtR(v);};
async function J(ep,opt){try{const r=await fetch(ep,opt);return await r.json();}catch(e){return{erro:String(e)};}}
const card=(h,cls)=>`<div class="card ${cls||''}">${h}</div>`;
const kpi=(v,l,cor,gl)=>`<div class="card kpi"><div class="l">${l}</div><div class="v" ${cor?`style="color:${cor}"`:''}>${v}</div>${gl?`<span class="gl">${gl}</span>`:''}</div>`;
const sec=(t,cnt)=>`<h2 class="sec">${t}${cnt!=null?`<span class="cnt">${cnt}</span>`:''}</h2>`;
const spin=t=>`<div class="skel"><span class="sp"></span>${t||'Carregando…'}</div>`;
const cover=(sph,t,s,ic)=>`<div class="cover ${sph}"><div class="t">${t}</div><div class="s">${s}</div><span class="ic">${ic}</span></div>`;
const leitura=t=>`<div class="leitura">🧭 ${t}</div>`;
// botão "Gerar PDF" (padrão Kroll) para qualquer aba de inteligência
const btnPdf=tipo=>`<button class="btn ghost" style="flex:0 0 auto;min-width:120px" onclick="gerarPdfIntel('${tipo}',this)">📄 Gerar PDF</button>`;
async function gerarPdfIntel(tipo,el){
  const txt=el.innerHTML;el.innerHTML='<span class="sp" style="width:12px;height:12px"></span> gerando…';el.disabled=true;
  const r=await J('/api/intel/pdf?tipo='+encodeURIComponent(tipo));
  el.disabled=false;el.innerHTML=txt;
  if(r.ok&&r.url){window.open(r.url,'_blank');}
  else{alert('Falha ao gerar PDF: '+(r.erro||'indisponível'));}
}
// barra de ação da aba (PDF + eventuais extras), colocada logo após o cover
const acoesAba=(tipo,extra)=>`<div class="btns" style="margin:-4px 0 14px">${btnPdf(tipo)}${extra||''}</div>`;
function toggle(el){el.classList.toggle('open');}
function filtrar(inp,sel){const q=inp.value.toLowerCase();document.querySelectorAll(sel).forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q)?'':'none';});}
// ordena qualquer lista por NOME do fornecedor (A→Z) e volta à ordem original (por risco/valor)
function ordenar(sel,btn){
  const cont=document.querySelector(String(sel).split(' ')[0]); if(!cont)return;
  const cards=[...cont.querySelectorAll(':scope > .card')]; if(!cards.length)return;
  const chave=c=>((c.querySelector('.clk,b,strong,a')||c).textContent||'').trim().toLowerCase();
  const az=btn.classList.toggle('on');
  if(az){cards.forEach((c,i)=>{if(c.dataset.ord0==null)c.dataset.ord0=i;});
         cards.sort((a,b)=>chave(a).localeCompare(chave(b),'pt'));btn.textContent='A→Z ✓';}
  else{cards.sort((a,b)=>(+a.dataset.ord0)-(+b.dataset.ord0));btn.textContent='A→Z';}
  cards.forEach(c=>cont.appendChild(c));
  const cv=document.querySelector('#view .view-wire'); if(cv)cv.remove();   // posições mudaram → tira malha estática
}
const clk=(cnpj,txt)=>{const d=String(cnpj||'').replace(/\D/g,'');return d.length===14?`<span class="clk" onclick="abrirDossie('${d}','${esc(String(txt)).replace(/'/g,'')}')">${esc(txt)}</span>`:`<b>${esc(txt)}</b>`;};

// ═══ ESFERAS ═══
const SPHERES=[
  {id:'inicio',    ic:'◎', tl:'Início',        c:'command deck ao vivo'},
  {id:'estado',    ic:'🏛️', tl:'Estado',       c:'órgãos estaduais (SIAFE + PNCP)'},
  {id:'prefeitura',ic:'🏙️', tl:'Prefeitura·Rio',c:'município do Rio (PNCP + folha)'},
  {id:'geral',     ic:'🌐', tl:'Transversal',  c:'riscos, busca, poder, ferramentas'},
];
const TABS={
  inicio:[
    {id:'i_cockpit', ic:'◎',tl:'Cockpit', render:renderCockpit},
  ],
  estado:[
    {id:'e_panorama',ic:'📊',tl:'Panorama',render:renderPanoramaEstado},
    {id:'e_pericias',ic:'⚖️',tl:'Perícias',render:renderPericias},
    {id:'e_sanc',    ic:'🚫',tl:'Sancionadas',render:()=>renderSancionadas('estado')},
    {id:'e_frac',    ic:'✂️',tl:'Fracion.',render:renderFracionamento},
    {id:'e_sobre',   ic:'📈',tl:'Sobrepreço',render:renderSobrepreco},
    {id:'e_escal',   ic:'📈',tl:'Escalada', render:renderEscalada},
    {id:'e_comp',    ic:'💰',tl:'Comparador',render:renderComparador},
    {id:'e_adit',    ic:'📑',tl:'Aditivos',render:renderAditivos},
    {id:'e_cartel',  ic:'🔗',tl:'Cartel',  render:renderCartel},
    {id:'e_conluio', ic:'🕸️',tl:'Conluio', render:()=>renderConluio('estado')},
    {id:'e_poder',   ic:'🏛️',tl:'Nomeados',render:renderPoder},
    {id:'e_alertas', ic:'🚨',tl:'Alertas', render:renderAlertas},
    {id:'e_siafe',   ic:'💰',tl:'SIAFE',   render:renderSiafe},
  ],
  prefeitura:[
    {id:'p_panorama',ic:'📊',tl:'Panorama',render:renderPanoramaPref},
    {id:'p_comis',   ic:'🎖️',tl:'Comissionados',render:renderComissionadosPref},
    {id:'p_conluio', ic:'🕸️',tl:'Conluio', render:()=>renderConluio('prefeitura')},
    {id:'p_contr',   ic:'📄',tl:'Contratos',render:renderContratosPref},
  ],
  geral:[
    {id:'g_buscar',  ic:'🔎',tl:'Buscar',  render:renderBuscar},
    {id:'g_radar',   ic:'🎯',tl:'Radar',   render:renderRadar},
    {id:'g_prioridade',ic:'⚡',tl:'Prioridade',render:renderPrioridade},
    {id:'g_conluioq',ic:'🤝',tl:'Conluio QSA',render:renderConluioQSA},
    {id:'g_comun',   ic:'🧩',tl:'Comunidades',render:renderComunidades},
    {id:'g_retro',   ic:'🔮',tl:'Retro',   render:renderRetro},
    {id:'g_riscos',  ic:'👻',tl:'Riscos',  render:renderRiscos},
    {id:'g_dep',     ic:'🔗',tl:'Cativos', render:renderFornecedorDependente},
    {id:'g_capital', ic:'🫧',tl:'Capital irrisório',render:renderCapital},
    {id:'g_dez',     ic:'📅',tl:'Dezembro',render:renderCorridaDezembro},
    {id:'g_ocult',   ic:'🕸️',tl:'Sócio oculto',render:renderSocioOculto},
    {id:'g_nep',     ic:'👪',tl:'Nepotismo',render:renderNepotismo},
    {id:'g_nepx',    ic:'🔀',tl:'Nepot. cruzado',render:renderNepotismoCruzado},
    {id:'g_fenix',   ic:'🦅',tl:'Fênix',   render:renderFenix},
    {id:'g_porta',   ic:'🚪',tl:'Porta giratória',render:renderPortaGiratoria},
    {id:'g_laranjas',ic:'🎭',tl:'Laranjas',render:renderLaranjas},
    {id:'g_socserv', ic:'🕴️',tl:'Servidor-sócio',render:renderSocioServidor},
    {id:'g_poder',   ic:'🏛️',tl:'Poder',   render:renderPoder},
    {id:'g_conluio', ic:'🕸️',tl:'Conluio', render:()=>renderConluio(_cjEsf)},
    {id:'g_validar', ic:'🏢',tl:'Validar', render:renderValidar},
    {id:'g_sweeps',  ic:'🛰️',tl:'Sweeps',  render:renderSweeps},
    {id:'g_acoes',   ic:'⚡',tl:'Ações',   render:renderAcoes},
  ],
};
let esfera='inicio',aba='i_cockpit';
const sessaoReports=new Set();

function montarSpheres(){
  $('spheres').innerHTML=SPHERES.map(s=>`<div class="sph ${s.id} ${s.id===esfera?'on':''}" onclick="trocarEsfera('${s.id}')"><span class="i">${s.ic}</span><div><div>${s.tl}</div><div class="c">${s.c}</div></div></div>`).join('');
}
function montarTabs(){
  $('tabs').innerHTML=TABS[esfera].map(t=>`<button class="${t.id===aba?'on':''}" onclick="ir('${t.id}')"><span class="ti">${t.ic}</span><span class="tl">${t.tl}</span></button>`).join('');
}
function trocarEsfera(id){esfera=id;aba=TABS[id][0].id;montarSpheres();montarTabs();ir(aba);}
let _nav=0; // token anti-corrida
async function ir(id){
  // blindagem: se o id não é da esfera atual, procura a esfera dona e troca (evita crash)
  let t=TABS[esfera].find(x=>x.id===id);
  if(!t){for(const e of Object.keys(TABS)){const cand=TABS[e].find(x=>x.id===id);if(cand){esfera=e;t=cand;montarSpheres();break;}}}
  if(!t)return;
  aba=id;montarTabs();
  const meu=++_nav;
  const v=$('view');v.innerHTML=spin();
  try{const html=await t.render();if(meu!==_nav)return;v.innerHTML=`<div class="fade">${html}</div>`;}
  catch(e){if(meu!==_nav)return;v.innerHTML=card(`<div class="warn">⚠ Falha: ${esc(e)}</div>`);}
  window.scrollTo(0,0);
  if(aba!=='i_cockpit')vivo();   // cockpit tem animação própria; demais abas herdam a "vida"
}

// ═══ VIDA GLOBAL — o cockpit em toda aba (cascata · contagem · malha de luz) ═══
let _wireRAF=0;
function vivo(){
  const v=$('view'); if(!v) return;
  const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const top=[...v.querySelectorAll('.card,.cover')].filter(el=>!el.parentElement.closest('.card,.cover'));
  // 1) cascata de entrada + pulso "ao vivo" no 1º KPI
  top.forEach((el,i)=>{el.classList.add('rise');el.style.setProperty('--d',Math.min(i*18,220)+'ms');});
  if(!rm){const k=v.querySelector('.kpi');if(k)setTimeout(()=>k.classList.add('beat'),700);}
  // 2) números que sobem
  if(!rm)v.querySelectorAll('.kpi .v').forEach(_countUp);
  // 3) A→Z em TODA busca de lista (vale pra tudo; padrão continua por risco/valor)
  v.querySelectorAll('.search').forEach(box=>{
    const inp=box.querySelector('input[oninput*="filtrar"]'); if(!inp||box.querySelector('.az'))return;
    const m=(inp.getAttribute('oninput')||'').match(/filtrar\(this,\s*'([^']+)'\)/); if(!m)return;
    const b=document.createElement('button');b.type='button';b.className='az';b.textContent='A→Z';
    b.title='Ordenar por nome do fornecedor (A→Z) · clique de novo p/ voltar à ordem por risco';
    b.setAttribute('onclick',`ordenar('${m[1]}',this)`);box.appendChild(b);
  });
  // 4) malha de luz ligando os cards
  _wire(top,rm);
}
function _countUp(el){
  const raw=(el.textContent||'').trim();
  const m=raw.match(/^([^\d]*?)(\d[\d.\s]*(?:,\d+)?)(.*)$/); if(!m)return;
  const pre=m[1],suf=m[3],dec=(m[2].split(',')[1]||'').length;
  const val=parseFloat(m[2].replace(/[.\s]/g,'').replace(',','.'));
  if(!isFinite(val)||val===0)return;
  el.classList.add('counting');const t0=performance.now(),dur=850;
  (function step(t){const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);
    el.textContent=pre+(val*e).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;
    if(p<1)requestAnimationFrame(step);else{el.textContent=raw;el.classList.remove('counting');}})(t0);
}
function _wire(nodes,rm){
  cancelAnimationFrame(_wireRAF);
  const v=$('view'),fade=v&&v.querySelector('.fade'); if(!v||!fade||nodes.length<2)return;
  let cv=v.querySelector('.view-wire');
  if(!cv){cv=document.createElement('canvas');cv.className='view-wire';v.insertBefore(cv,fade);}
  const cx=cv.getContext('2d'),dpr=Math.min(2,devicePixelRatio||1),vr=v.getBoundingClientRect();
  const W=v.clientWidth,H=Math.max(v.scrollHeight,fade.scrollHeight);
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';cx.scale(dpr,dpr);
  const pts=nodes.slice(0,46).map(el=>{const r=el.getBoundingClientRect();
    return {x:r.left-vr.left+Math.min(r.width/2,80),y:r.top-vr.top+9};});
  // arestas: cada nó liga aos 2 vizinhos mais próximos (grafo esparso, sem cruzar tudo)
  const edges=[];
  pts.forEach((a,i)=>{const d=pts.map((b,j)=>({j,d:(a.x-b.x)**2+(a.y-b.y)**2})).filter(o=>o.j!==i).sort((p,q)=>p.d-q.d).slice(0,2);
    d.forEach(o=>{const k=i<o.j?i+'-'+o.j:o.j+'-'+i;if(!edges.some(e=>e.k===k))edges.push({k,a:i,b:o.j});});});
  function draw(t){
    cx.clearRect(0,0,W,H);
    edges.forEach(e=>{const A=pts[e.a],B=pts[e.b];
      cx.strokeStyle='rgba(79,214,196,.13)';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(A.x,A.y);cx.lineTo(B.x,B.y);cx.stroke();});
    pts.forEach(p=>{cx.fillStyle='rgba(79,214,196,.32)';cx.beginPath();cx.arc(p.x,p.y,1.6,0,6.283);cx.fill();});
    if(!rm){edges.forEach((e,i)=>{const A=pts[e.a],B=pts[e.b],ph=((t/1400)+i*0.16)%1;
      const x=A.x+(B.x-A.x)*ph,y=A.y+(B.y-A.y)*ph;
      const g=cx.createRadialGradient(x,y,0,x,y,7);g.addColorStop(0,'rgba(120,240,220,.75)');g.addColorStop(1,'rgba(120,240,220,0)');
      cx.fillStyle=g;cx.beginPath();cx.arc(x,y,7,0,6.283);cx.fill();});
      _wireRAF=requestAnimationFrame(draw);}
  }
  draw(rm?0:performance.now());
}

      <div class="right"><div class="num" style="font-weight:800;font-size:20px;color:var(--rose)">${x.razao}×</div><div class="dim">${fmtR(x.preco_inicial)} → ${fmtR(x.preco_final)}</div></div></div>
      <div class="kv" style="margin-top:8px"><span class="k">série: ${serie}</span></div>
      ${leitura(`<b>${esc(x.fornecedor)}</b> vendeu "${esc(x.item)}" começando em <b>${fmtR(x.preco_inicial)}</b> e chegando a <b>${fmtR(x.preco_final)}</b> (<b>${x.razao}× mais caro</b>) em ${x.span_dias} dias${x.final_vs_mercado?`, hoje <b>${x.final_vs_mercado}× a mediana de mercado</b> do item`:''}. Nenhum reajuste legítimo triplica preço nessa janela — indício de preço dirigido. Confirmar especificação no termo de referência.`)}`,

async function _compBuscar(){

  if(!d.grupos.length)return h+card(`<div class="warn">Nenhum grupo comparável para "${esc(_compTermo)}". Tente outro termo (a base é o preço unitário do PNCP).</div>`);
  h+=`<div class="dim" style="margin-bottom:8px">${d.n} grupo(s) — clique para ver quem paga mais/menos:</div>`;

  return h+`<div class="note">${esc(d.ressalva||'')}</div>`;

// bloco de LIFT: valida cada detector contra o gabarito objetivo (sanções)
async function _liftBloco(){
  const d=await J('/api/intel/lift');
  if(!d.ok)return '';
  const det=d.detectores||[];
  const barra=(l,circ)=>{const w=Math.min(100,(l||0)/15*100);const col=circ?'var(--muted)':(l>=2?'var(--rose)':(l>=1?'var(--amber)':'var(--green,#4ade80)'));
    return `<div style="background:rgba(255,255,255,.06);border-radius:4px;height:8px;overflow:hidden"><div style="width:${w}%;height:100%;background:${col}"></div></div>`;};
  let h=sec('Validação contra o gabarito objetivo (sanções) — lift por detector');
  h+=`<div class="dim" style="margin-bottom:8px">Taxa-base do universo: <b>${(d.taxa_base*100).toFixed(1)}%</b> dos ${fmtN(d.universo)} fornecedores são sancionados. <b>Lift</b> = quantas vezes o detector concentra sancionados acima disso. <b>lift ≥ 2</b> = sinal forte · <b>~1</b> = ruído · <b>&lt; 1</b> = anti-sinal · <span class="dim">🔁 circular</span> = usa sanção como input (não é corroboração independente).</div>`;
  h+=`<div class="grid">`+det.map(x=>card(
    `<div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
      <div style="min-width:0;flex:1"><div style="font-weight:700">${esc(x.detector)} ${x.circular?'<span class="tag" style="opacity:.6">🔁 circular</span>':''}${x.n_pequeno?'<span class="tag amber">⚠️ n<10</span>':''}</div>
      <div class="muted" style="font-size:12.5px;margin:3px 0">${x.sancionados}/${x.n} marcados são sancionados (${(x.taxa*100).toFixed(1)}%)</div>
      ${barra(x.lift,x.circular)}</div>
      <div class="right"><div class="num" style="font-weight:800;font-size:22px;color:${x.circular?'var(--muted)':(x.lift>=2?'var(--rose)':(x.lift>=1?'var(--amber)':'#4ade80'))}">${x.lift}×</div><div class="dim">lift</div></div></div>`)).join('')+`</div>`;
  return h;
}

      <pre id="ac-out" style="margin-top:13px;display:none"></pre>`)+
    `<div style="height:18px"></div>`+sec('Relatórios gerados')+repsHtml+
    `<div style="height:18px"></div>`+sec('Painéis')+`<div class="lnks">
      <a class="lnk" href="/auditoria"><span class="ic">📊</span><div><div class="t">Painel de Auditoria</div><div class="d">KPIs clássicos</div></div><span class="ar">→</span></a>
      <a class="lnk" href="/graph"><span class="ic">🕸️</span><div><div class="t">Grafo de fraude</div><div class="d">relações entre entes</div></div><span class="ar">→</span></a>
      <a class="lnk" href="/graph?fonte=familias" target="_blank"><span class="ic">👪</span><div><div class="t">Grafo de famílias</div><div class="d">clãs em cargos + suas empresas</div></div><span class="ar">→</span></a>
      <a class="lnk" href="/hermes"><span class="ic">🤖</span><div><div class="t">Yoda / Hermes</div><div class="d">chat e relatórios</div></div><span class="ar">→</span></a></div>`;
}
async function acao(tipo){
  const out=$('ac-out');out.style.display='block';let url,body,val;
  if(tipo==='relatorio'){val=$('ac-emp').value.trim();if(!val)return;url='/api/relatorio/inteligencia';body={empresa:val};}
  if(tipo==='orgao'){val=$('ac-org').value.trim();if(!val)return;url='/api/relatorio/orgao';body={orgao:val};}
  if(tipo==='dossie'){val=$('ac-dos').value.trim();if(!val)return;url='/api/dossie';body={alvo:val};}
  out.textContent=`⏳ processando "${val}"… (até ~1 min)`;const t0=Date.now()/1000;
  const antes=new Set(((await J('/api/compliance/reports'))||[]).filter(x=>x.type==='pdf').map(x=>x.name));
  const d=await J(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(d.erro){out.textContent='⚠ erro: '+d.erro;return;}
  if(d.ambiguo){out.textContent=`❓ ambíguo: ${d.pergunta}\ncandidatos: ${(d.candidatos||[]).map(c=>c.nome||c).join(' · ')}`;return;}
  if(d.status==='gerando'||(d.msg&&d.path_pdf==null&&d.resumo==null)){out.textContent=(d.msg||'⏳ Gerando…').replace(/\*/g,'');return pollarPdf(out,val,t0,antes);}
  const pdf=d.path_pdf||d.path_lex||d.path_xlsx;
  const linha=[d.empresa||d.orgao||val,d.risco?('risco '+d.risco):'',d.grau_lex?('Lex '+d.grau_lex):'',d.score!=null?('score '+d.score):''].filter(Boolean).join(' · ');
  out.innerHTML=`✅ ${esc(linha)}\n${esc((d.resumo||'').slice(0,500))}`+(pdf?`\n\n📄 <a href="/${pdf.replace(/^\//,'')}" target="_blank" style="color:var(--accent)">abrir PDF</a>`:'');
}
async function pollarPdf(out,termo,t0,antes){
  const slug=(termo||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,12);
  for(let i=0;i<36;i++){await new Promise(r=>setTimeout(r,5000));
    const pdfs=((await J('/api/compliance/reports'))||[]).filter(x=>x.type==='pdf');
    let novos=pdfs.filter(x=>x.mtime&&x.mtime>t0);if(!novos.length)novos=pdfs.filter(x=>!antes.has(x.name));
    const alvo=novos.find(x=>slug&&x.name.toLowerCase().includes(slug))||novos[0];
    if(alvo){sessaoReports.add(alvo.name);out.innerHTML='✅ pronto: '+esc(alvo.name)+`\n\n📄 <a href="${alvo.url}" target="_blank" style="color:var(--accent)">abrir PDF</a> (apaga ao sair)`;return;}}
  out.textContent='⏳ Ainda gerando — confira no Telegram ou em Relatórios.';
}
function limparEfemeros(){if(!sessaoReports.size)return;const body=JSON.stringify({nomes:[...sessaoReports]});
  try{navigator.sendBeacon('/api/compliance/reports/limpar',new Blob([body],{type:'application/json'}));}
  catch(e){fetch('/api/compliance/reports/limpar',{method:'POST',headers:{'Content-Type':'application/json'},body,keepalive:true});}}
window.addEventListener('pagehide',limparEfemeros);window.addEventListener('beforeunload',limparEfemeros);

// ═══ COCKPIT (aba Início) — command deck ao vivo ═══
let _ckMX=.5,_ckMY=.5,_ckTimer=null;
addEventListener('pointermove',e=>{_ckMX=e.clientX/innerWidth;_ckMY=e.clientY/innerHeight;},{passive:true});
function netbgStart(){
  const cv=$('netbg');if(!cv)return;const ctx=cv.getContext('2d');let W,H,pts,raf;
  const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function size(){const d=Math.min(2,devicePixelRatio);W=cv.width=innerWidth*d;H=cv.height=innerHeight*d;
    cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';cv._d=d;
    const n=Math.min(56,Math.floor(innerWidth/26));
    pts=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,z:Math.random()*.8+.2,
      vx:(Math.random()-.5)*.11*d,vy:(Math.random()-.5)*.11*d,r:(Math.random()*1.5+.6)*d}));}
  function draw(){const d=cv._d,D=150*d;ctx.clearRect(0,0,W,H);const px=(_ckMX-.5)*26*d,py=(_ckMY-.5)*26*d;
    for(let i=0;i<pts.length;i++){const p=pts[i];if(!rm){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
      const ox=p.x+px*p.z,oy=p.y+py*p.z;p._ox=ox;p._oy=oy;
      for(let j=i+1;j<pts.length;j++){const q=pts[j],qx=q.x+px*q.z,qy=q.y+py*q.z,dx=ox-qx,dy=oy-qy,dd=Math.hypot(dx,dy);
        if(dd<D){ctx.strokeStyle='rgba(63,224,208,'+((1-dd/D)*.15)+')';ctx.lineWidth=d*.5;ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(qx,qy);ctx.stroke();}}
      ctx.beginPath();ctx.arc(ox,oy,p.r,0,7);ctx.fillStyle='rgba(120,230,220,'+(.32+p.z*.28)+')';ctx.fill();}
    if(!rm)raf=requestAnimationFrame(draw);}
  addEventListener('resize',()=>{cancelAnimationFrame(raf);size();draw();});size();draw();
}
function _ckSpark(cv,vals,color){const d=Math.min(2,devicePixelRatio),w=cv.width=cv.offsetWidth*d,h=cv.height=cv.offsetHeight*d,ctx=cv.getContext('2d');
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1,X=k=>k/(vals.length-1)*w,Y=v=>h-8*d-(v-mn)/rg*(h-14*d);
  let pr=0;(function f(){pr=Math.min(1,pr+.06);const cut=Math.floor(pr*(vals.length-1));ctx.clearRect(0,0,w,h);
    ctx.beginPath();for(let k=0;k<=cut;k++)k?ctx.lineTo(X(k),Y(vals[k])):ctx.moveTo(X(k),Y(vals[k]));
    ctx.lineTo(X(cut),h);ctx.lineTo(0,h);ctx.closePath();const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,color+'55');g.addColorStop(1,color+'00');ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();for(let k=0;k<=cut;k++)k?ctx.lineTo(X(k),Y(vals[k])):ctx.moveTo(X(k),Y(vals[k]));ctx.strokeStyle=color;ctx.lineWidth=1.6*d;ctx.stroke();
    ctx.beginPath();ctx.arc(X(cut),Y(vals[cut]),2.6*d,0,7);ctx.fillStyle=color;ctx.fill();if(pr<1)requestAnimationFrame(f);})();}
function _ckSynth(seed,n=15){const a=[];let v=seed;for(let i=0;i<n;i++){v+=(Math.sin(i*1.3+seed)*.5+(Math.random()-.42))*seed*.13;a.push(Math.max(.2,v));}return a;}
function _ckCount(el,to,fmt,ms=1000){if(!el)return;const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;if(rm||to==null){el.textContent=fmt(to);return;}
  const t0=performance.now();(function s(t){const p=Math.min(1,(t-t0)/ms),e=1-Math.pow(1-p,3);el.textContent=fmt(to*e);if(p<1)requestAnimationFrame(s);else el.textContent=fmt(to);})(performance.now());}
const _CK={teal:'#4fd6c4',gold:'#e8bd72',good:'#3fe08a',amber:'#f5a623',rose:'#ff5c78'};

async function renderCockpit(){
  const html=`<div class="ck">
    <div class="ck-ticker"><div class="lane" id="ck-lane"><span>◉ carregando telemetria…</span></div></div>
    <div class="ck-hero">
      <div class="ck-eye">Economia potencial identificada</div>
      <div class="ck-big" id="ck-econ">R$ ——</div>
      <div class="ck-sub" id="ck-sub">Quanto os cofres públicos deixariam de gastar se cada compra acima da mediana tivesse pago a <b>mediana de mercado</b> do item.</div>
      <div class="ck-ved" id="ck-vedbox" style="display:none"><span class="n" id="ck-ved">R$ —</span>
        <span class="l">pago <b style="color:var(--rose)">acima do mercado a fornecedor juridicamente vedado</b> (inidôneo), à época — o alvo mais forte.</span></div>
    </div>
    <div class="ck-grid" id="ck-grid"></div>
    <div class="ck-fontes" id="ck-fontes"></div></div>`;
  setTimeout(ckBoot,0);   // preenche após o innerHTML assentar
  return html;
}
function ckCard(id,lab,valc,dotc,href,spark){return `<div class="ck-inst" id="cki-${id}" onclick="ir('${href}')">
  <div class="k"><span class="lab">${lab}</span><span class="dot ${dotc}"></span></div>
  <div class="val ${valc}">—</div><div class="meta">aguardando…</div>
  ${spark?`<canvas class="spk" data-spark="${spark}"></canvas>`:''}</div>`;}
function ckFill(id,{num,txt,meta}={}){const el=$('cki-'+id);if(!el)return;const v=el.querySelector('.val'),m=el.querySelector('.meta');
  if(num!=null&&isFinite(num))_ckCount(v,num,x=>fmtN(Math.round(x)));else if(txt!=null)v.textContent=txt;
  if(meta!=null)m.innerHTML=meta;const cv=el.querySelector('canvas[data-spark]');if(cv)requestAnimationFrame(()=>_ckSpark(cv,_ckSynth(6+Math.random()*9),_CK[cv.dataset.spark]||'#4fd6c4'));}
let _ckTick=[];
function ckPush(items){items.forEach(x=>_ckTick.push(x));const L=$('ck-lane');if(L&&_ckTick.length)L.innerHTML=_ckTick.concat(_ckTick).map(x=>`<span class="${x.c||''}">${x.h}</span>`).join('');}
function ckBoot(){
  const g=$('ck-grid');if(!g)return;
  g.innerHTML=[ckCard('radar','Radar de risco','ckamber','bgamber','g_radar','amber'),
    ckCard('com','Comunidades','ckteal','bgteal','g_comun','teal'),
    ckCard('dossie','Caro + suspeito','ckrose','bgrose','e_comp','rose'),
    ckCard('lift','Melhor detector (lift)','ckgood','bggood','g_retro','good'),
    ckCard('fenix','Pago a empresa morta','ckrose','bgrose','g_fenix','rose'),
    ckCard('compras','Compras auditáveis','ckgold','bggold','e_comp','gold'),
    ckCard('orgao','Órgão que mais economiza','ckgood','bggood','e_comp')].join('');
  ckPull(true);
  clearInterval(_ckTimer);_ckTimer=setInterval(()=>{if(!document.hidden&&aba==='i_cockpit')ckPull(false);},30000);
}
function ckPull(first){
  _ckTick=[];
  J('/api/comparador/economia').then(d=>{if(!d||!d.ok)return;
    _ckCount($('ck-econ'),d.economia_total,fmtRc,first?1300:900);
    if($('ck-sub'))$('ck-sub').innerHTML=`Se cada uma das <b>${fmtN(d.n_compras_acima_mediana)}</b> compras acima da mediana tivesse pago a <b>mediana de mercado</b> do item.`;
    ckFill('compras',{num:d.n_compras_acima_mediana,meta:'acima da mediana de mercado, priorizadas por economia'});
    const o=d.por_orgao&&d.por_orgao[0];ckFill('orgao',{txt:o?(o.orgao||'').split(' ').slice(0,2).join(' '):'—',meta:o?`potencial de <b>${fmtRc(o.economia)}</b> a recuperar`:'—'});
    ckPush([{c:'g',h:`✦ economia potencial <b>${fmtRc(d.economia_total)}</b> em ${fmtN(d.n_compras_acima_mediana)} compras`}]);});
  J('/api/comparador/vedada').then(d=>{if(d&&d.ok&&d.economia_vedada_total){const b=$('ck-vedbox');if(b)b.style.display='';_ckCount($('ck-ved'),d.economia_vedada_total,fmtRc);}});
  J('/api/intel/radar?limite=6').then(d=>{if(!d||!d.ok)return;ckFill('radar',{num:d.n,meta:`fornecedores com sinal · <b class="ckrose">${fmtN(d.n_vermelho)}</b> em nível crítico`});
    ckPush((d.achados||[]).slice(0,5).map(a=>({c:'',h:`▸ RADAR ${a.score} — <b>${(a.nome||'').slice(0,30)}</b> · ${(a.sinais||[]).map(s=>s.sinal).slice(0,2).join(', ')}`})));});
  J('/api/intel/comunidades').then(d=>{if(!d||!d.ok)return;ckFill('com',{num:d.n,meta:'clusters família-empresa-órgão (Louvain)'});});
  J('/api/intel/lift').then(d=>{if(!d||!d.ok)return;const b=(d.detectores||[]).filter(x=>!x.circular).sort((a,c)=>(c.lift||0)-(a.lift||0))[0];
    ckFill('lift',{txt:b?b.lift+'×':'—',meta:b?`<b>${b.detector}</b> concentra fraude ${b.lift}× acima da base`:'—'});});
  J('/api/comparador/dossie').then(d=>{if(!d||!d.ok)return;ckFill('dossie',{num:d.n,meta:'itens pagos caro a fornecedor sancionado/fantasma'});
    ckPush((d.achados||[]).slice(0,6).map(a=>({c:'a',h:`◉ ${(a.orgao||'').slice(0,24)} pagou <b>${a.vs_mediana}× a mediana</b> — ${(a.fornecedor||'').slice(0,24)} (sancionada)`})));});
  J('/api/intel/fenix').then(d=>{if(!d||!d.ok)return;
    ckFill('fenix',{txt:fmtRc(d.total_defunta||0),meta:`<b>${fmtN(d.n_defunta)}</b> empresas BAIXADA/INAPTA que receberam do Estado`});
    ckPush([{c:'a',h:`◉ <b>${fmtRc(d.total_defunta)}</b> pagos a ${fmtN(d.n_defunta)} empresas MORTAS/irregulares`}]);});
  J('/api/fontes/frescor').then(d=>{const box=$('ck-fontes');if(!box||!d||!d.fontes)return;
    const cor=f=>{const s=(f.estado||'').toLowerCase();if(s.includes('verde')||s.includes('ok')||s.includes('fresc'))return '#3fe08a';
      if(s.includes('amar')||s.includes('aten')||s.includes('velh'))return '#f5a623';if(s.includes('verm')||s.includes('erro')||s.includes('crit'))return '#ff5c78';
      return f.idade_dias==null?'#637192':(f.idade_dias<=2?'#3fe08a':(f.idade_dias<=10?'#f5a623':'#ff5c78'));};
    box.innerHTML=`<div class="ck-flabel">Fontes de dados — frescor ao vivo</div><div class="ck-fgrid">`+
      d.fontes.map(f=>`<div class="ck-fchip" title="${esc(f.detalhe||'')}"><span class="fled" style="background:${cor(f)};box-shadow:0 0 8px ${cor(f)}"></span>
        <span class="fnm">${esc((f.fonte||'').replace(/·/g,'·'))}</span><span class="fage">${f.idade_dias==null?'—':f.idade_dias+'d'}</span></div>`).join('')+`</div>`;});
}
