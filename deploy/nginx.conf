upstream politimonitor {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/politimonitor.access.log;
    error_log  /var/log/nginx/politimonitor.error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        alias /root/JFN/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon e arquivos públicos
    location /favicon.ico {
        alias /root/JFN/public/favicon.ico;
        expires 1d;
        access_log off;
    }

    location /public/ {
        alias /root/JFN/public/;
        expires 7d;
        access_log off;
    }

    # Proxy para o Next.js
    location / {
        proxy_pass http://politimonitor;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
