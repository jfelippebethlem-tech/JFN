name: Coleta OBs SIAFE (MGS CLEAN 2023-2026)

on:
  workflow_dispatch:
    inputs:
      siafe_user:
        description: 'SIAFE_USER (CPF sem pontos)'
        required: true
      siafe_pass:
        description: 'SIAFE_PASS'
        required: true
      anos:
        description: 'Anos (ex: 2023,2024,2025,2026)'
        required: false
        default: '2023,2024,2025,2026'
      telegram_token:
        description: 'TELEGRAM_BOT_TOKEN — necessário para MFA automático'
        required: false
        default: ''
      telegram_chat:
        description: 'TELEGRAM_CHAT_ID — necessário para MFA automático'
        required: false
        default: ''

jobs:
  coletar-obs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: claude/rj-finance-agent-BYlhJ
          token: ${{ github.token }}

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
          pip install requests python-dotenv 2>/dev/null || true

      - name: Instalar dependencias do sistema para Chromium
        run: |
          # Ubuntu 24.04 Noble renomeou libasound2 para libasound2t64
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libgbm1 libxkbcommon0 libxfixes3 libxrandr2 \
            libx11-xcb1 libdbus-1-3 libnss3 libnspr4 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxdamage1 libxcomposite1 libpango-1.0-0 libcairo2 \
            fonts-liberation libfontconfig1 libx11-6 libxext6 libxss1 \
            2>/dev/null || true

      - name: Instalar Chromium (playwright)
        run: playwright install chromium

      - name: Criar .env e diretorios
        run: |
          mkdir -p data/sei_cache screenshots/obs_coleta
          printf 'SIAFE_USER=%s\nSIAFE_PASS=%s\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_ID=%s\nCI=true\nHEADLESS=true\n' \
            '${{ github.event.inputs.siafe_user }}' \
            '${{ github.event.inputs.siafe_pass }}' \
            '${{ github.event.inputs.telegram_token }}' \
            '${{ github.event.inputs.telegram_chat }}' > .env

      - name: Coletar OBs SIAFE 2023-2026
        env:
          CI: "true"
          HEADLESS: "true"
          TELEGRAM_BOT_TOKEN: ${{ github.event.inputs.telegram_token }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat }}
        run: python _SANDBOX/coletar_obs_agora.py
        timeout-minutes: 45

      - name: Verificar resultado
        run: |
          if [ -f data/sei_cache/mgsclean_obs_todas.json ]; then
            python3 -c "
          import json, sys
          d = json.load(open('data/sei_cache/mgsclean_obs_todas.json'))
          print(f'OBs coletadas : {d.get(\"total_obs\",0)}')
          print(f'Valor total   : R\$ {d.get(\"total_valor\",0):,.2f}')
          sys.exit(0 if d.get('total_obs',0)>0 else 1)
            "
          else
            echo 'ERRO: arquivo de OBs nao gerado'
            ls -la data/sei_cache/ || true
            cat data/sei_cache/debug_login_*.txt 2>/dev/null || true
            exit 1
          fi

      - name: Gerar PDF de auditoria
        run: python _SANDBOX/gerar_relatorio_obs_pdf.py 2>/dev/null || true

      - name: Commit e push dos dados
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "JFN Coleta SIAFE"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/jfelippebethlem-tech/JFN.git
          git add data/sei_cache/ reports/ 2>/dev/null || true
          git add data/compliance.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: OBs/debug SIAFE $(date +%Y-%m-%d_%H%M)"
          git push origin claude/rj-finance-agent-BYlhJ

      - name: Salvar artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obs-siafe-run-${{ github.run_number }}
          path: |
            data/sei_cache/
            reports/auditoria*.pdf
            screenshots/obs_coleta/
          retention-days: 30
