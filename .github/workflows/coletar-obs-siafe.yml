name: Coleta OBs SIAFE (Todas as Empresas)

on:
  workflow_dispatch:
    inputs:
      siafe_user:
        description: 'SIAFE_USER (CPF sem pontos) — vazio = usa secret SIAFE_USER'
        required: false
        default: ''
      siafe_pass:
        description: 'SIAFE_PASS — vazio = usa secret SIAFE_PASS'
        required: false
        default: ''
      anos:
        description: 'Anos para coletar (ex: 2023,2024,2025,2026)'
        required: false
        default: '2023,2024,2025,2026'
      cnpjs:
        description: 'CNPJs alvo separados por vírgula (vazio = usa data/empresas_target.json)'
        required: false
        default: ''
      telegram_token:
        description: 'TELEGRAM_BOT_TOKEN (opcional)'
        required: false
        default: ''
      telegram_chat:
        description: 'TELEGRAM_CHAT_ID (opcional)'
        required: false
        default: ''

jobs:
  coletar-obs:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: claude/rj-finance-agent-BYlhJ

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          pip install requests python-dotenv 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true
          playwright install chromium

      - name: Configurar .env com credenciais
        env:
          INPUT_USER: ${{ github.event.inputs.siafe_user }}
          INPUT_PASS: ${{ github.event.inputs.siafe_pass }}
          SECRET_USER: ${{ secrets.SIAFE_USER }}
          SECRET_PASS: ${{ secrets.SIAFE_PASS }}
          INPUT_TG_TOKEN: ${{ github.event.inputs.telegram_token }}
          INPUT_TG_CHAT: ${{ github.event.inputs.telegram_chat }}
          SECRET_TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SECRET_TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data/sei_cache screenshots/obs_coleta
          SIAFE_USER="${INPUT_USER:-$SECRET_USER}"
          SIAFE_PASS="${INPUT_PASS:-$SECRET_PASS}"
          TG_TOKEN="${INPUT_TG_TOKEN:-$SECRET_TG_TOKEN}"
          TG_CHAT="${INPUT_TG_CHAT:-$SECRET_TG_CHAT}"
          echo "::add-mask::$SIAFE_PASS"
          printf 'SIAFE_USER=%s\nSIAFE_PASS=%s\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_ID=%s\nCI=true\nHEADLESS=true\n' \
            "$SIAFE_USER" "$SIAFE_PASS" "$TG_TOKEN" "$TG_CHAT" > .env
          echo "Ambiente configurado. USER=${SIAFE_USER:0:4}***"

      - name: Coletar Ordens Bancárias SIAFE
        run: |
          echo "Iniciando coleta — Anos: ${{ github.event.inputs.anos }} | CNPJs: ${SIAFE_CNPJS:-arquivo}"
          python _SANDBOX/coletar_obs_agora.py
        timeout-minutes: 90
        env:
          CI: true
          HEADLESS: true
          DISPLAY: ''
          PYTHONUNBUFFERED: '1'
          SIAFE_ANOS: ${{ github.event.inputs.anos }}
          SIAFE_CNPJS: ${{ github.event.inputs.cnpjs }}

      - name: Verificar e exibir resultado
        if: always()
        run: |
          echo "=== Arquivos gerados ==="
          ls -lh data/sei_cache/obs_*.json 2>/dev/null || true
          ls -lh data/sei_cache/mgsclean_obs*.json 2>/dev/null || true
          if [ -f "data/sei_cache/obs_todas.json" ]; then
            python3 -c "
          import json
          d = json.load(open('data/sei_cache/obs_todas.json'))
          print('=== RESULTADO DA COLETA ===')
          print(f'Empresas: {d.get(\"empresas\", 1)}')
          print(f'Total OBs: {d.get(\"total_obs\", 0)}')
          print(f'Valor total: R\$ {d.get(\"total_valor\", 0):,.2f}')
          print(f'Anos: {d.get(\"anos_cobertos\", [])}')
          "
          elif [ -f "data/sei_cache/mgsclean_obs_todas.json" ]; then
            python3 -c "
          import json
          d = json.load(open('data/sei_cache/mgsclean_obs_todas.json'))
          print(f'Total OBs: {d.get(\"total_obs\", 0)} | R\$ {d.get(\"total_valor\", 0):,.2f}')
          "
          else
            echo "AVISO: nenhum arquivo de OBs gerado"
            ls -la data/sei_cache/ || true
          fi

      - name: Gerar PDF de auditoria
        if: always()
        run: python _SANDBOX/gerar_relatorio_obs_pdf.py 2>/dev/null || true

      - name: Commit e push dos dados coletados
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "JFN Coleta SIAFE"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/jfelippebethlem-tech/JFN.git
          git add data/sei_cache/obs_*.json 2>/dev/null || true
          git add data/sei_cache/mgsclean_obs*.json 2>/dev/null || true
          git add data/sei_cache/obs_progress.json 2>/dev/null || true
          git add data/compliance.db 2>/dev/null || true
          git add reports/*.pdf 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: OBs SIAFE coletadas via GitHub Actions $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase origin claude/rj-finance-agent-BYlhJ 2>/dev/null || true
          git push origin claude/rj-finance-agent-BYlhJ

      - name: Salvar artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obs-siafe-${{ github.run_number }}
          path: |
            data/sei_cache/obs_*.json
            data/sei_cache/mgsclean_obs*.json
            reports/auditoria*.pdf
            screenshots/obs_coleta/
          retention-days: 30
