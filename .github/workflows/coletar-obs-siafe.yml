name: Coleta OBs SIAFE

on:
  workflow_dispatch:
    inputs:
      siafe_user:
        description: 'SIAFE_USER (CPF sem pontos) - vazio usa secret'
        required: false
        default: ''
      siafe_pass:
        description: 'SIAFE_PASS - vazio usa secret'
        required: false
        default: ''
      anos:
        description: 'Anos para coletar (ex: 2023,2024,2025,2026)'
        required: false
        default: '2023,2024,2025,2026'
      cnpjs:
        description: 'CNPJs alvo separados por virgula (vazio = arquivo)'
        required: false
        default: ''

jobs:
  coletar-obs:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          ref: claude/rj-finance-agent-BYlhJ

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install requests python-dotenv 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true
          playwright install chromium

      - name: Configurar credenciais
        env:
          INPUT_USER: ${{ github.event.inputs.siafe_user }}
          INPUT_PASS: ${{ github.event.inputs.siafe_pass }}
          SECRET_USER: ${{ secrets.SIAFE_USER }}
          SECRET_PASS: ${{ secrets.SIAFE_PASS }}
          SECRET_TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SECRET_TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data/sei_cache screenshots/obs_coleta
          SIAFE_USER="${INPUT_USER:-$SECRET_USER}"
          SIAFE_PASS="${INPUT_PASS:-$SECRET_PASS}"
          echo "::add-mask::$SIAFE_PASS"
          printf 'SIAFE_USER=%s\nSIAFE_PASS=%s\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_ID=%s\nCI=true\nHEADLESS=true\n' \
            "$SIAFE_USER" "$SIAFE_PASS" "$SECRET_TG_TOKEN" "$SECRET_TG_CHAT" > .env
          echo "Ambiente configurado. USER=${SIAFE_USER:0:4}***"

      - name: Coletar Ordens Bancarias SIAFE
        run: python _SANDBOX/coletar_obs_agora.py
        timeout-minutes: 90
        env:
          CI: true
          HEADLESS: true
          DISPLAY: ''
          PYTHONUNBUFFERED: '1'
          SIAFE_ANOS: ${{ github.event.inputs.anos }}
          SIAFE_CNPJS: ${{ github.event.inputs.cnpjs }}

      - name: Verificar resultado
        if: always()
        run: |
          ls -lh data/sei_cache/obs_*.json 2>/dev/null || true
          ls -lh data/sei_cache/mgsclean_obs*.json 2>/dev/null || true
          if [ -f "data/sei_cache/obs_todas.json" ]; then
            python3 -c "import json; d=json.load(open('data/sei_cache/obs_todas.json')); print(f'OBs={d.get(chr(34)+'total_obs'+chr(34),0)} Valor=R\${d.get(chr(34)+'total_valor'+chr(34),0):,.2f}')" 2>/dev/null || cat data/sei_cache/obs_todas.json
          fi

      - name: Gerar PDF de auditoria
        if: always()
        run: python _SANDBOX/gerar_relatorio_obs_pdf.py 2>/dev/null || true

      - name: Commit e push dos dados
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "JFN Coleta SIAFE"
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/jfelippebethlem-tech/JFN.git
          git add data/sei_cache/ data/compliance.db reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: OBs SIAFE $(date '+%Y-%m-%d %H:%M')"
          git push origin claude/rj-finance-agent-BYlhJ

      - name: Salvar artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obs-siafe-${{ github.run_number }}
          path: |
            data/sei_cache/
            reports/auditoria*.pdf
            screenshots/obs_coleta/
          retention-days: 30
