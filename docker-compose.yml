services:
  yoda:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      YODA_DB_PATH: /data/yoda_memory.db
      YODA_REPO_PATH: /app
    volumes:
      - yoda_data:/data
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import sqlite3; sqlite3.connect('/data/yoda_memory.db').execute('SELECT 1')"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  yoda_data:
