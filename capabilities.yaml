# capabilities.yaml — CONTRATO ÚNICO entre o orquestrador (Yoda) e o motor (JFN).
# Fonte de verdade das capacidades. NÃO editar os derivados à mão — gerar via tools/gen_*.py.
# Origem: JFN-DOCUMENTO-MESTRE-CONSOLIDADO §7 (docs/refs/). Status: PRONTO = já existe; "ONDA N" = alvo da onda.
# Regra de ouro do roteador: o Yoda só pode chamar ids presentes aqui; fora do registro = erro explícito.
meta:
  versao: "2.3.0"   # 2026-07-20: +certame_indice, +conjunto_orgao, +conjunto_portfolio, +sei_acatamento (dossiê mestre)
  atualizado: "2026-07-20"
  base_http: "http://127.0.0.1:8000"
  cli_prefixo: "cd ~/JFN && PYTHONPATH=. .venv/bin/python -m"
  invariantes:
    - "OB = pagamento; Empenho != pagamento"
    - "Honestidade: REAL vs CACHE; nunca fabricar numero"
    - "Juridico: indicios, nunca acusacao"
    - "Mercado: reportar OOS + custos; nunca prometer certeza"
    - "LGPD: dados pessoais so p/ controle publico legitimo (base legal = obrigacao legal/atribuicao, nao legitimo interesse)"
    - "Ferramentas/fontes 100% gratuitas (sem IBKR/nada pago)"

capacidades:
  # ---- AUDITORIA ----
  - {id: relatorio_inteligencia, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/relatorio/inteligencia, status: PRONTO,
     descricao: "Due diligence de FORNECEDOR (PDF+XLSX+parecer Lex). GATILHO FORTE: um CNPJ (14 digitos, com ou sem mascara 00.000.000/0000-00) OU um nome de empresa SOZINHO na mensagem = pedido de relatorio -> CHAME ESTA FERRAMENTA IMEDIATAMENTE com {cnpj:...} ou {empresa:...}. NUNCA responda em texto sobre a empresa sem antes gerar; NUNCA peca confirmacao.", quando_usar: "CNPJ sozinho na mensagem; nome de empresa sozinho; 'relatorio/auditoria/due diligence/dossie de <empresa>'; 'analisa a empresa X'; 'quem e o CNPJ Y'", exemplo: "03.686.998/0001-18",
     args: {empresa: "string (um de empresa|cnpj)", cnpj: "string", anos: "list[int] opcional"},
     retorno: "{cnpj,empresa,risco,score,path_pdf,path_xlsx,path_lex,grau_lex} | {ambiguo,candidatos}", enviar_telegram: [path_pdf, path_xlsx, path_lex],
     menu: {grupo: "🏢 Auditoria & Relatórios", nome: "Relatório de um fornecedor", exemplo: "due diligence da MGS Clean", ordem: 11, cmd: "/relatorio"}}
  - {id: relatorio_orgao, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/relatorio/orgao, status: PRONTO,
     descricao: "Inteligencia de ORGAO/UG (PDF+XLSX+parecer Lex de orgao)", quando_usar: "auditoria de orgao/UG/secretaria", exemplo: "quanto o ITERJ pagou e a quem em 2024",
     args: {orgao: "string (um de orgao|ug)", ug: "string", anos: "list[int] opcional"},
     retorno: "{ug,orgao,path_pdf,path_xlsx,path_lex,grau_lex} | {ambiguo,candidatos}", enviar_telegram: [path_pdf, path_xlsx, path_lex],
     menu: {grupo: "🏢 Auditoria & Relatórios", nome: "Relatório de um órgão/UG", exemplo: "quanto o ITERJ pagou e a quem em 2024", ordem: 12, cmd: "/orgao"}}
  - {id: listar_ugs, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/ugs, status: PRONTO,
     descricao: "Catalogo das UGs/orgaos: codigo + nome + nº OBs + total pago (o /UG)", quando_usar: "'/ug', 'quais os codigos/nomes dos orgaos/UGs', 'listar UGs', 'qual o codigo da SEEDUC', 'que orgaos existem', ANTES de pedir o /orgao quando nao se sabe o codigo", exemplo: "/ug tribunal",
     args: {filtro: "string opcional (nome OU codigo; acento nao importa)", limite: "int opcional"}, retorno: "{texto,ugs[],n,n_total}", enviar_telegram: [],
     menu: {grupo: "🏢 Auditoria & Relatórios", nome: "Catálogo de UGs/órgãos (códigos e nomes)", exemplo: "/ug tribunal", ordem: 13, cmd: "/ug"}}
  - {id: anomalias, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/anomalias, status: PRONTO,
     descricao: "Anomalias em OBs (+Benford na Onda 3)", quando_usar: "triagem de risco; 'algo estranho em X'",
     args: {ug: opcional, cnpj: opcional, exercicio: opcional}, retorno: "{alertas[]}",
     menu: {grupo: "🔎 Investigação", nome: "Anomalias automáticas nos pagamentos", exemplo: "algo estranho nos pagamentos do ITERJ?", ordem: 24}}
  - {id: certame_indice, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/certame/indice, status: PRONTO,
     descricao: "Indice de Direcionamento de Certame 0-100 (7 familias, inclui execucao da ata: inabilitacao em massa/trivial)", quando_usar: "risco de um certame/licitacao especifica pelo nº de controle PNCP", exemplo: "indice do certame 34023077000107-1-000085/2024",
     args: {certame: "string (nº de controle PNCP)"}, retorno: "{ok,indice:{score,faixa,confianca,familias,drivers,matriz_sv}}"}
  - {id: conjunto_orgao, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/conjunto/orgao, status: PRONTO,
     descricao: "Avaliacao de CONJUNTO dos certames de um orgao (mediana/p90 do indice, reincidencia de clausula restritiva -> auditoria tematica, eliminacoes triviais, HHI de vitorias)", quando_usar: "visao de portfolio de um orgao licitante (CNPJ do orgao)", exemplo: "conjunto dos certames do CNPJ 34023077000107",
     args: {cnpj: "string (CNPJ do orgao no PNCP)"}, retorno: "{ok,avaliacao,secao_html}"}
  - {id: conjunto_portfolio, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/conjunto/portfolio, status: PRONTO,
     descricao: "Ranking de ORGAOS por risco de certame (peer-benchmark: desvio da mediana do orgao vs pares)", quando_usar: "quais orgaos tem o pior padrao de licitacao; avaliacao global do conjunto", exemplo: "ranking de orgaos por risco de certame",
     args: {min_certames: "int opcional (default 3)"}, retorno: "{ok,n_orgaos,mediana_pares,orgaos[]}",
     menu: {grupo: "🔎 Investigação", nome: "Ranking de órgãos por risco de certame (conjunto)", exemplo: "ranking de órgãos por risco", ordem: 27, cmd: "/conjunto"}}
  - {id: sei_acatamento, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/sei/acatamento, status: PRONTO,
     descricao: "Acatamento de pareceres (art. 53 Lei 14.133): autoridade acolheu/contrariou motivadamente/silenciou/ignorou pareceres PGE/PGM/CGE/CGM no processo", quando_usar: "os pareceres juridicos/controladoria foram atendidos no processo X?", exemplo: "pareceres do SEI-330020/000762/2021 foram acatados?",
     args: {processo: "string (nº SEI)"}, retorno: "{ok,veredito,pareceres[],despachos[],leitura}"}
  - {id: dossie_completo, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/dossie/completo, status: PRONTO,
     descricao: "Dossie COMPLETO de fornecedor em PDF (360 + veredito de fachada + clausulas restritivas na integra + suspeitas + arvore/integra SEI) + analise juridica Lex + planilha", quando_usar: "dossie completo/tudo sobre uma empresa/fornecedor por CNPJ", exemplo: "dossie completo da MGS Clean | tudo sobre o CNPJ X",
     args: {cnpj: "string (CNPJ 14 digitos)"}, retorno: "{ok,status,msg} (assincrono, PDFs no Telegram)", enviar_telegram: [path_pdf]}
  - {id: dossie_mestre, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/dossie/mestre, status: PRONTO,
     descricao: "Dossie Mestre de LICITACOES em PDF (Kroll): portfolio de orgaos (ranking+peer-benchmark) ou 1 orgao (CNPJ) com avaliacao de conjunto", quando_usar: "dossie mestre/panorama de licitacoes de um orgao ou do conjunto de orgaos", exemplo: "dossie mestre de licitacoes do CNPJ 30051023000196 | dossie mestre do portfolio",
     args: {alvo: "string opcional (CNPJ do orgao; vazio = portfolio)"}, retorno: "{ok,status,msg} (assincrono, PDF no Telegram)", enviar_telegram: [path_pdf]}
  - {id: cartel, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/cartel, status: PRONTO,
     descricao: "Cartel/bid-rigging em grafo + QSA (concentracao, rodizio, socios em comum entre concorrentes)", quando_usar: "conluio/cartel/combinacao; 'os concorrentes do fornecedor X tem socio em comum?'", exemplo: "fornecedores presos a um so orgao (modo=captura)? socios em comum do CNPJ X (modo=qsa)?",
     args: {modo: "captura|dependencia|vizinhanca|cruzado|qsa", cnpj: "obrigatorio p/ vizinhanca/cruzado/qsa", top: opcional}, retorno: "{modo,dados,aviso}",
     menu: {grupo: "🔎 Investigação", nome: "Cartel/conluio entre fornecedores", exemplo: "tem cartel nas licitações da UG 133100?", ordem: 21}}
  - {id: rodizio, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/rodizio, status: PRONTO,
     descricao: "Rodizio temporal de cartel (bid rotation): vencedores que se revezam no topo de uma UG ano a ano", quando_usar: "rodizio/revezamento de vencedores; 'a UG X tem fornecedores que se alternam no 1o lugar?'", exemplo: "rodizio na UG 170100? varredura das UGs com indicio de rodizio?",
     args: {ug: "opcional (sem ug = varredura)", qsa: "1 cruza socios dos campeoes (concorrencia ficticia)", top: opcional}, retorno: "{ug,dados,aviso}"}
  - {id: conflito_doador_contrato, agente: lex, dominio: auditoria, tipo: http, metodo: GET, rota: /api/conflito, status: PRONTO,
     descricao: "Cruza doacoes TSE com contratos/OB (doador->fornecedor)", quando_usar: "'quem me doou ganhou contrato', conflito de interesse",
     args: {cnpj: "um de cnpj|candidato", candidato: "string"}, retorno: "{rede[]}", fonte: "TSE + SIAFE/PNCP",
     menu: {grupo: "🔎 Investigação", nome: "Doador de campanha que virou fornecedor", exemplo: "quem me doou ganhou contrato?", ordem: 23}}
  - {id: sobrepreco, agente: lex, dominio: auditoria, tipo: http, metodo: GET, rota: /api/sobrepreco, status: PRONTO,
     descricao: "Preco pago vs mediana de referencia (Compras Dados Abertos, CATMAT/CATSER)", quando_usar: "'esta caro?', superfaturamento, R4",
     args: {codigo: "int CATMAT|CATSER obrigatorio", valor: "float preco pago", servico: "bool (CATSER)"}, retorno: "{mediana_ref,p25,p75,pct,classificacao,fonte}"}
  - {id: cruzamento, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/cruzamento, status: PRONTO,
     descricao: "OB<->CNPJ<->SEI<->socios", quando_usar: "'cruze os dados da empresa X'", args: {cnpj: obrigatorio}, retorno: "{obs,processos_sei,socios}",
     menu: {grupo: "🔎 Investigação", nome: "Cruzar OB × CNPJ × SEI × sócios", exemplo: "cruze os dados da empresa X", ordem: 22, cmd: "/cruzamento"}}
  - {id: concentracao_grupo, agente: jfn, dominio: auditoria, tipo: cli, comando: "compliance_agent.grafo_cartel --vizinhanca <CNPJ>", status: PRONTO,
     descricao: "Concentracao OCULTA por GRUPO economico numa UG: colapsa os fornecedores por socio em comum (dedup por raiz CNPJ-8) — muitos CNPJs que parecem concorrentes mas sao UM grupo = diversidade/concorrencia FICTICIA (Art. 90 Lei 8.666 · 337-F CP · Art. 36 Lei 12.529-CADE). INDICIO a corroborar no certame (SEI/PNCP), nunca acusacao; QSA mascarado/indisponivel != afastado.",
     quando_usar: "'ha concentracao escondida por grupo na UG X?', 'esses concorrentes sao na verdade o mesmo grupo?', cartel oculto / concorrencia simulada numa UG", exemplo: "concentracao por grupo na UG 660100 (Grupo Vieira concentrou fatia relevante via varios CNPJs)",
     args: {ug: "obrigatorio (codigo da UG)"}, retorno: "{ug,ug_nome,indicio,n_cnpjs,n_grupos,n_grupos_multi,hhi_grupo,maior_grupo_multi,grupos[],nota}", nota: "Funcao concentracao_por_grupo(ug); a varredura noturna das maiores UGs roda no cruzador. DuckDB pesado -> nao rodar manual na VM em horario de sweep."}
  - {id: emendas_coletar, agente: jfn, dominio: auditoria, tipo: cli, comando: "tools/emendas_coletar.py [--anos 2019 ... 2026]", status: PRONTO,
     descricao: "Coleta emendas parlamentares federais (Portal da Transparencia) nos 2 recortes RJ: autor = deputado federal RJ (legs 56/57, roster Camara) OU destino = municipio do RJ. Empenhado/liquidado/pago SEPARADOS; checkpoint retomavel; PIX via Transferegov (emendas.transferegov). Grava emendas/emenda_favorecidos/emendas_pix_planos.",
     quando_usar: "'atualizar emendas', 'coletar emendas do deputado X / destino Y'", exemplo: "tools/emendas_coletar.py --anos 2026",
     args: {anos: "list[int] opcional (default 2019-2026)", pausa: "float opcional"}, retorno: "linhas por ano no stdout", nota: "Divide a cota da PORTAL_TRANSPARENCIA_KEY (90 req/min) — NAO rodar junto do coletor de favorecidos."}
  - {id: emendas_pericia, agente: jfn, dominio: auditoria, tipo: cli, comando: "tools/emendas_pericia.py [--telegram] [--sem-pdf]", status: PRONTO,
     descricao: "Pericia deterministica de emendas D1-D6 (PIX impedida, concentracao autor->destino, favorecido sancionado, fachada, retroalimentacao doador-socio, empenho sem execucao) -> PDF Kroll + XLSX + alertas. Indicio != acusacao; cobertura declarada por detector.",
     quando_usar: "'pericia/analise das emendas', 'quais emendas suspeitas'", exemplo: "tools/emendas_pericia.py --telegram",
     args: {telegram: "flag", sem_pdf: "flag"}, retorno: "reports/emendas_rj_pericia_<data>.pdf + xlsx", enviar_telegram: [path_pdf, path_xlsx],
     menu: {grupo: "🕵️ Fiscalização & Perícias", nome: "Perícia das emendas parlamentares (RJ)", exemplo: "quais emendas suspeitas?", ordem: 41}}
  - {id: nucleo_pericia, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/nucleo/comando, status: PRONTO,
     descricao: "Nucleo de pericia INTERATIVO (inteligencia progressiva): pericia na hora de OB/CNPJ/contrato, veredito humano que fecha o ciclo de aprendizado, placar de acerto, fantasma (8 sinais), fases de contratacao, promover hipotese, ficha do certame (Indice de Direcionamento). Comandos: /pericia /veredito /placar /fantasma /fases /promover /ciclo_nucleo /fornecedor /parametros /evolucao /certame.",
     quando_usar: "'pericia a empresa X / OB Y', 'veredito confirmado/descartado', 'placar do nucleo', 'essa empresa e fantasma/laranja?', 'fantasma cnpj X', 'fases da contratacao', 'como foi o certame <n PNCP>?'", exemplo: "pericia a MGS Clean / fantasma 19088605000104 / certame 01612981000190-1-000029/2025",
     args: {comando: "string ex.: /pericia (ou omitir e mandar texto)", args: "string alvo (CNPJ/OB/ref)", texto: "string livre (roteador deterministico)"},
     retorno: "{ok, comando, resposta(markdown)}",
     menu: {grupo: "🕵️ Fiscalização & Perícias", nome: "Perícia na hora (OB/CNPJ/contrato) + fantasma", exemplo: "essa empresa é fantasma?", ordem: 45, cmd: "/pericia"}}
  - {id: pcrj_gastos_coletar, agente: jfn, dominio: auditoria, tipo: cli, comando: "tools/pcrj_gastos_coletar.py [--ini AAAAMMDD --fim AAAAMMDD]", status: PRONTO,
     descricao: "Contratos/empenhos + licitacoes do MUNICIPIO do Rio via PNCP (descobre orgaos municipais pelo IBGE 3304557); despesa por credor historica 2008-2023 via ContasRio/Open_Data_Empenhos (pcrj.contasrio.coletar_exercicios). Grava pcrj_contratos/pcrj_licitacoes/pcrj_despesa.",
     quando_usar: "'atualizar gastos/contratos da prefeitura do Rio'", exemplo: "tools/pcrj_gastos_coletar.py --ini 20250101 --fim 20251231",
     args: {ini: "AAAAMMDD", fim: "AAAAMMDD"}, retorno: "contagens no stdout", nota: "Despesa por credor 2024+ NAO tem arquivo aberto (INDISPONIVEL != 0); app ContasRio e Vaadin — NUNCA scrapear."}
  - {id: pcrj_pericia_gastos, agente: jfn, dominio: auditoria, tipo: cli, comando: "tools/pcrj_pericia_gastos.py [--telegram] [--sem-pdf]", status: PRONTO,
     descricao: "Pericia deterministica de gastos PCRJ D7-D10 (fracionamento janela 90d abaixo do teto de dispensa, credor recem-aberto, socio de credor na folha municipal [homonimo sinalizado], rede societaria entre fornecedores + aditivos > art. 125) -> PDF Kroll + XLSX + alertas.",
     quando_usar: "'pericia dos gastos da prefeitura', 'fracionamento na PCRJ'", exemplo: "tools/pcrj_pericia_gastos.py --telegram",
     args: {telegram: "flag", sem_pdf: "flag"}, retorno: "reports/pcrj_gastos_pericia_<data>.pdf + xlsx", enviar_telegram: [path_pdf, path_xlsx],
     menu: {grupo: "🕵️ Fiscalização & Perícias", nome: "Perícia dos gastos da Prefeitura do Rio", exemplo: "fracionamento na PCRJ?", ordem: 42}}
  - {id: pcrj_gastos_achados, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/pcrj/gastos_achados, status: PRONTO,
     descricao: "Achados JA PERICIADOS dos gastos da Prefeitura (D7 fracionamento, D8 credor recem-aberto, D9 socio na folha, D10 rede entre concorrentes, aditivo estourado) — leitura instantanea dos alertas da ultima corrida, dedup por titulo. Para RE-rodar a pericia use pcrj_pericia_gastos.",
     quando_usar: "'quais os achados de gastos da prefeitura', 'me mostra o fracionamento da PCRJ agora'", exemplo: "GET /api/pcrj/gastos_achados",
     args: {limite_por_detector: "int (5-200, default 40)"}, retorno: "{ok, detectores{contagens}, achados{por detector}}",
     menu: {grupo: "🕵️ Fiscalização & Perícias", nome: "Achados de gastos da Prefeitura (instantâneo)", exemplo: "quais os achados de gastos da PCRJ?", ordem: 48}}
  - {id: pcrj_fantasmas, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/pcrj/fantasmas, status: PRONTO,
     descricao: "Sinais de servidor-fantasma na Camara/Prefeitura do Rio (8 sinais deterministicos somados em escore; faixas forte/verificar/fraco; homonimo sinalizado). FUNIL de priorizacao OSINT — a prova definitiva e o ponto/frequencia interno, que so apuracao formal alcanca. Indicio != acusacao.",
     quando_usar: "'servidores fantasmas na prefeitura/camara', 'quem tem sinal de fantasma', 'faixa forte de fantasma'", exemplo: "GET /api/pcrj/fantasmas?faixa=forte",
     args: {faixa: "forte|verificar|fraco (opcional)", limite: "int (1-800)"}, retorno: "{ok, n, faixas{}, itens[], gerado_em}",
     menu: {grupo: "👥 Pessoal × Benefícios", nome: "Sinais de servidor-fantasma (Câmara/PCRJ)", exemplo: "servidores fantasma na faixa forte?", ordem: 52}}
  - {id: pcrj_dossie_comissionados, agente: jfn, dominio: auditoria, tipo: cli, comando: "tools/pcrj_finalizar.py", status: PRONTO,
     descricao: "Dossie Kroll COMPLETO de comissionados/gabinetes da Camara x Prefeitura do Rio: acumulo com direcao temporal, movimentacoes gabinete<->prefeitura<->candidatura, alternancia titular/suplente, candidatos nominais (TSE) e relatorio por gabinete. Roda a finalizacao autonoma do sweep all-RJ (aguarda sweep terminar).",
     quando_usar: "'dossie dos comissionados', 'relatorio completo dos gabinetes', 'finaliza o sweep da camara'", exemplo: "tools/pcrj_finalizar.py",
     args: {}, retorno: "PDFs Kroll em reports/ (dossie completo + gabinetes)", enviar_telegram: [path_pdf],
     menu: {grupo: "👥 Pessoal × Benefícios", nome: "Dossiê completo de comissionados/gabinetes", exemplo: "dossiê dos gabinetes da Câmara", ordem: 53}}
  - {id: ppp_dossie, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/ppp, status: PRONTO,
     descricao: "Dossie pericial de PPP/concessao municipal (Prefeitura do Rio): capta CCPAR + Diario Oficial + edital completo, roda os motores (E1-E7, direcionamento, Lex, fraudes) + a lente PPP (garantia via Fundo Nacional de Saude, aporte, PMI-captura, 5% RCL, verificador) -> PDF Kroll. Indicio != acusacao.",
     quando_usar: "'dossie/pericia da PPP X', 'a PPP do Souza Aguiar', 'concessao/parceria publico-privada da prefeitura'", exemplo: "faz a pericia da PPP do Souza Aguiar",
     args: {projeto: "string (nome do projeto, ex.: 'souza aguiar')", slug: "string opcional (slug CCPAR)"},
     retorno: "{ok,status:'gerando',msg} (assincrono; empurra o PDF no Telegram)", enviar_telegram: [path_pdf],
     menu: {grupo: "🕵️ Fiscalização & Perícias", nome: "Dossiê pericial de PPP/concessão (Prefeitura)", exemplo: "faz a perícia da PPP do Souza Aguiar", ordem: 46, cmd: "/ppp"}}
  - {id: ppp_triagem, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/ppp/triagem, status: PRONTO,
     descricao: "Triagem EM LOTE das PPPs/concessoes municipais captadas, pela lente PPP (garantia via Fundo Nacional de Saude, aporte publico, PMI-captura, prazo/valor vs 5% da RCL, verificador independente); lista rankeada por gravidade. Indicio != acusacao.",
     quando_usar: "'triagem das PPPs', 'quais PPPs/concessoes da prefeitura tem risco', 'lista as PPPs em lote'", exemplo: "faz a triagem das PPPs da prefeitura",
     args: {}, retorno: "{ok,itens[],resumo,texto}", enviar_telegram: [],
