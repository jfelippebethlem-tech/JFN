# ---- MENU do /lista no Telegram (fonte ÚNICA; o adapter carrega o derivado ~/.hermes/jfn_menu.json) ----
# Regra: mexeu aqui → rodar tools/gen_capabilities_md.py (pre-commit já roda). O adapter tem fallback
# hardcoded só p/ o caso do JSON ausente/corrompido — a verdade é ESTA seção.
menu_lista:
  texto: |
    🧭 **JFN — o que você precisa, Mestre Jorge?**

    🏢 **Relatório de fornecedor** — tudo que uma empresa recebeu do Estado, com rede e risco.
    🏛️ **Relatório de órgão** — quanto uma secretaria/UG pagou, e a quem.
    🔎 **Investigar** — cartel, rede de sócios e se a empresa está sancionada.
    🕵️ **Fiscalização & perícias** — emendas, gastos e editais da Prefeitura, parecer de contratos.
    👥 **Pessoal × benefícios** — quem do quadro (nomeado? efetivo?) recebe benefício; sócios também.
    📚 **Ver todas as funções** — o catálogo completo.

    *Toque numa opção ou fale comigo em linguagem natural.*
  teclado:
    - [["🏢 Relatório de fornecedor", "menu:forn"]]
    - [["🏛️ Relatório de órgão", "menu:orgao"]]
    - [["🔎 Investigar (cartel/rede)", "menu:invest"]]
    - [["🕵️ Fiscalização & perícias", "menu:fisc"]]
    - [["👥 Pessoal × benefícios", "menu:benef"]]
    - [["📚 Ver todas as funções", "menu:all"]]
  dicas:
    forn: |
      🏢 **Relatório de fornecedor**
      Tudo que uma empresa recebeu do Estado, com rede de sócios e nível de risco (PDF + planilha + parecer jurídico Lex).

      Me diga o nome ou o CNPJ — ex.: *due diligence da MGS Clean*.
    orgao: |
      🏛️ **Relatório de órgão**
      Quanto uma secretaria/UG pagou, a quem, com concentração e parecer Lex do órgão.

      Ex.: *quanto o ITERJ pagou em 2024*. Não sabe o código? Use /ug para achar o órgão.
    invest: |
      🔎 **Investigar**
      Cartel/conluio entre fornecedores, rede de poder (sócios e doações de campanha) e se a empresa está sancionada (CEIS/CNEP).

      Ex.: *tem cartel na UG 133100?* · *quem está ligado à empresa X*.
    fisc: |
      🕵️ **Fiscalização & perícias**
      Perícia das emendas parlamentares (RJ), gastos da Prefeitura (fracionamento/credor recém-aberto), direcionamento em editais (cláusula a cláusula) e parecer de contratos estilo Tribunal de Contas. Também a perícia na hora: /pericia e /fantasma.

      Ex.: *quais emendas suspeitas?* · *fracionamento na PCRJ?* · *há direcionamento nos editais?* · *parecer dos contratos*.
    benef: |
      👥 **Pessoal × benefícios**
      Quem do quadro da Câmara/Prefeitura recebe BPC/Bolsa Família — com a **natureza do vínculo explícita** (nomeado em comissão × efetivo × requisitado × pensionista × não informado pela fonte) — e sócios de fornecedores com benefício (com o total que a empresa recebeu do Estado).

      Ex.: *perícia de benefícios da prefeitura* · *quem do gabinete recebe benefício?* · *sócio de fornecedor com Bolsa Família?*
