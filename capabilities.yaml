# capabilities.yaml — CONTRATO ÚNICO entre o orquestrador (Yoda) e o motor (JFN).
# Fonte de verdade das capacidades. NÃO editar os derivados à mão — gerar via tools/gen_*.py.
# Origem: JFN-DOCUMENTO-MESTRE-CONSOLIDADO §7 (docs/refs/). Status: PRONTO = já existe; "ONDA N" = alvo da onda.
# Regra de ouro do roteador: o Yoda só pode chamar ids presentes aqui; fora do registro = erro explícito.
meta:
  versao: "2.1.0"
  atualizado: "2026-06-08"
  base_http: "http://127.0.0.1:8000"
  cli_prefixo: "cd ~/JFN && PYTHONPATH=. .venv/bin/python -m"
  invariantes:
    - "OB = pagamento; Empenho != pagamento"
    - "Honestidade: REAL vs CACHE; nunca fabricar numero"
    - "Juridico: indicios, nunca acusacao"
    - "Mercado: reportar OOS + custos; nunca prometer certeza"
    - "LGPD: dados pessoais so p/ controle publico legitimo (base legal = obrigacao legal/atribuicao, nao legitimo interesse)"
    - "Ferramentas/fontes 100% gratuitas (sem IBKR/nada pago)"

capacidades:
  # ---- AUDITORIA ----
  - {id: relatorio_inteligencia, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/relatorio/inteligencia, status: PRONTO,
     descricao: "Due diligence de FORNECEDOR (PDF+XLSX+parecer Lex)", quando_usar: "relatorio/auditoria/due diligence de empresa, CNPJ", exemplo: "due diligence da MGS Clean",
     args: {empresa: "string (um de empresa|cnpj)", cnpj: "string", anos: "list[int] opcional"},
     retorno: "{cnpj,empresa,risco,score,path_pdf,path_xlsx,path_lex,grau_lex} | {ambiguo,candidatos}", enviar_telegram: [path_pdf, path_xlsx, path_lex]}
  - {id: relatorio_orgao, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/relatorio/orgao, status: PRONTO,
     descricao: "Inteligencia de ORGAO/UG (PDF+XLSX+parecer Lex de orgao)", quando_usar: "auditoria de orgao/UG/secretaria", exemplo: "quanto o ITERJ pagou e a quem em 2024",
     args: {orgao: "string (um de orgao|ug)", ug: "string", anos: "list[int] opcional"},
     retorno: "{ug,orgao,path_pdf,path_xlsx,path_lex,grau_lex} | {ambiguo,candidatos}", enviar_telegram: [path_pdf, path_xlsx, path_lex]}
  - {id: listar_ugs, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/ugs, status: PRONTO,
     descricao: "Catalogo das UGs/orgaos: codigo + nome + nº OBs + total pago (o /UG)", quando_usar: "'/ug', 'quais os codigos/nomes dos orgaos/UGs', 'listar UGs', 'qual o codigo da SEEDUC', 'que orgaos existem', ANTES de pedir o /orgao quando nao se sabe o codigo", exemplo: "/ug tribunal",
     args: {filtro: "string opcional (nome OU codigo; acento nao importa)", limite: "int opcional"}, retorno: "{texto,ugs[],n,n_total}", enviar_telegram: []}
  - {id: anomalias, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/anomalias, status: PRONTO,
     descricao: "Anomalias em OBs (+Benford na Onda 3)", quando_usar: "triagem de risco; 'algo estranho em X'",
     args: {ug: opcional, cnpj: opcional, exercicio: opcional}, retorno: "{alertas[]}"}
  - {id: cartel, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/cartel, status: PRONTO,
     descricao: "Cartel/bid-rigging em grafo + QSA (concentracao, rodizio, socios em comum entre concorrentes)", quando_usar: "conluio/cartel/combinacao; 'os concorrentes do fornecedor X tem socio em comum?'", exemplo: "fornecedores presos a um so orgao (modo=captura)? socios em comum do CNPJ X (modo=qsa)?",
     args: {modo: "captura|dependencia|vizinhanca|cruzado|qsa", cnpj: "obrigatorio p/ vizinhanca/cruzado/qsa", top: opcional}, retorno: "{modo,dados,aviso}"}
  - {id: rodizio, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/rodizio, status: PRONTO,
     descricao: "Rodizio temporal de cartel (bid rotation): vencedores que se revezam no topo de uma UG ano a ano", quando_usar: "rodizio/revezamento de vencedores; 'a UG X tem fornecedores que se alternam no 1o lugar?'", exemplo: "rodizio na UG 170100? varredura das UGs com indicio de rodizio?",
     args: {ug: "opcional (sem ug = varredura)", qsa: "1 cruza socios dos campeoes (concorrencia ficticia)", top: opcional}, retorno: "{ug,dados,aviso}"}
  - {id: conflito_doador_contrato, agente: lex, dominio: auditoria, tipo: http, metodo: GET, rota: /api/conflito, status: PRONTO,
     descricao: "Cruza doacoes TSE com contratos/OB (doador->fornecedor)", quando_usar: "'quem me doou ganhou contrato', conflito de interesse",
     args: {cnpj: "um de cnpj|candidato", candidato: "string"}, retorno: "{rede[]}", fonte: "TSE + SIAFE/PNCP"}
  - {id: sobrepreco, agente: lex, dominio: auditoria, tipo: http, metodo: GET, rota: /api/sobrepreco, status: PRONTO,
     descricao: "Preco pago vs mediana de referencia (Compras Dados Abertos, CATMAT/CATSER)", quando_usar: "'esta caro?', superfaturamento, R4",
     args: {codigo: "int CATMAT|CATSER obrigatorio", valor: "float preco pago", servico: "bool (CATSER)"}, retorno: "{mediana_ref,p25,p75,pct,classificacao,fonte}"}
  - {id: cruzamento, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/cruzamento, status: PRONTO,
     descricao: "OB<->CNPJ<->SEI<->socios", quando_usar: "'cruze os dados da empresa X'", args: {cnpj: obrigatorio}, retorno: "{obs,processos_sei,socios}"}
  - {id: concentracao_grupo, agente: jfn, dominio: auditoria, tipo: cli, comando: "compliance_agent.grafo_cartel --vizinhanca <CNPJ>", status: PRONTO,
     descricao: "Concentracao OCULTA por GRUPO economico numa UG: colapsa os fornecedores por socio em comum (dedup por raiz CNPJ-8) — muitos CNPJs que parecem concorrentes mas sao UM grupo = diversidade/concorrencia FICTICIA (Art. 90 Lei 8.666 · 337-F CP · Art. 36 Lei 12.529-CADE). INDICIO a corroborar no certame (SEI/PNCP), nunca acusacao; QSA mascarado/indisponivel != afastado.",
     quando_usar: "'ha concentracao escondida por grupo na UG X?', 'esses concorrentes sao na verdade o mesmo grupo?', cartel oculto / concorrencia simulada numa UG", exemplo: "concentracao por grupo na UG 660100 (Grupo Vieira concentrou fatia relevante via varios CNPJs)",
     args: {ug: "obrigatorio (codigo da UG)"}, retorno: "{ug,ug_nome,indicio,n_cnpjs,n_grupos,n_grupos_multi,hhi_grupo,maior_grupo_multi,grupos[],nota}", nota: "Funcao concentracao_por_grupo(ug); a varredura noturna das maiores UGs roda no cruzador. DuckDB pesado -> nao rodar manual na VM em horario de sweep."}
  - {id: relacoes, agente: jfn, dominio: auditoria, tipo: cli, comando: "compliance_agent.relacoes \"<CNPJ | nome do socio | UG>\"", status: PRONTO,
     descricao: "Mapa de RELACOES de um alvo: socio<->empresa (QSA), empresa<->empresa por socio OU endereco em comum (dedup por raiz; indicio de grupo economico/concorrencia ficticia), empresa<->orgao (UGs que pagaram; UG em comum = vinculo mais forte). Resolve sozinho: 14dig=empresa, 6dig=UG, senao=nome de socio.",
     quando_usar: "'onde a empresa/socio X se relaciona', 'que empresas tem socio em comum com Y', 'quem sao os fornecedores ligados na UG Z', rede societaria de um alvo", exemplo: "relacoes do CNPJ 19088605000104 / relacoes do socio Fulano de Tal",
     args: {alvo: "obrigatorio (CNPJ | nome do socio | codigo de UG)", limite: "int opcional"}, retorno: "{ok,tipo,alvo,razao,socios[],empresas_via_socio[],empresas_via_endereco[],orgaos[],leitura}", nota: "Relacao e FATO (socio/endereco/contrato em comum), nao prova; CPF de socio mascarado (LGPD)."}
  - {id: sobrepreco_interno, agente: lex, dominio: auditoria, tipo: cli, comando: "compliance_agent.precos_extract", status: PRONTO,
     descricao: "Sobrepreco INTERNO (sem API externa): extrai a TABELA DE ITENS (descricao x qtd x preco unitario) de editais/contratos do SEI/PNCP por heuristica deterministica (regex, nunca inventa) e compara o MESMO item entre orgaos/contratos. Maior preco >= 2x o menor da mesma descricao = INDICIO de sobrepreco (a confirmar: especificacao/regiao/quantidade podem diferir).",
     quando_usar: "'esse item esta caro comparado a outros orgaos?', dispersao de preco unitario do mesmo produto sem precisar de CATMAT/mercado, complemento interno ao /sobrepreco", exemplo: "mesmo item de papel A4 pago a precos >=2x diferentes entre UGs",
     args: {texto: "texto do edital/contrato (extrair_itens); registros[] p/ sobrepreco_interno"}, retorno: "extrair_itens -> [{descricao,quantidade,unidade,preco_unitario,preco_total,fonte}]; sobrepreco_interno -> [{item,n,min,max,mediana,razao_max_min,mais_caro,mais_barato,sobrepreco_pct_vs_mediana}]", nota: "preco unitario e FATO extraido do texto; dispersao e INDICIO, nunca prova."}
  - {id: missao_autonoma, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/hermes/missao, status: PRONTO,
     descricao: "Auditoria autonoma aberta (loop hermes_goal CANONICO)", quando_usar: "pedido complexo/aberto", exemplo: "audite os pagamentos suspeitos do ITERJ em 2024", args: {missao: obrigatorio}, retorno: "{missao_id}"}
  - {id: missao_estado, agente: jfn, dominio: auditoria, tipo: http, metodo: GET, rota: /api/hermes/estado, status: PRONTO,
     descricao: "Estado do auditor autonomo: missao atual, Chrome 9222, LLM ok, contagens e aprendizados recentes.",
     quando_usar: "'qual a missao', 'como esta o hermes/auditor', antes de trabalhar/parar", args: {}, retorno: "{missao,chrome_9222,llm_ok,n_obs,n_alertas,aprendizados}"}
  - {id: missao_trabalhar, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/hermes/trabalhar, status: PRONTO,
     descricao: "Dispara o ciclo de trabalho da missao atual (roda em background ate concluir; bounded por passos/ciclos). SO quando o Mestre pedir explicitamente; para com missao_parar.",
     quando_usar: "'trabalha na missao', 'continua a auditoria' (pedido EXPLICITO do dono)", args: {}, retorno: "{ok,status}"}
  - {id: missao_parar, agente: jfn, dominio: auditoria, tipo: http, metodo: POST, rota: /api/hermes/parar, status: PRONTO,
     descricao: "Para o ciclo de trabalho autonomo em andamento e drena a fila de missoes.",
     quando_usar: "'para/pare a missao', 'cancela a auditoria autonoma'", args: {}, retorno: "{ok}"}
  # ---- GRAFO / DOSSIE ----
  - {id: grafo_poder, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/grafo, status: PRONTO,
     descricao: "Grafo unico: socios+servidores+doacoes+contratos+nomeacoes", quando_usar: "'quem esta ligado a X', 'a N saltos do deputado Y com contrato'",
     args: {alvo: obrigatorio, saltos: "int=2", so_contrato: bool}, retorno: "{nos,arestas,comunidades}"}
  - {id: dossie, agente: jfn, dominio: inteligencia, tipo: http, metodo: POST, rota: /api/dossie, status: PRONTO,
     descricao: "Dossie 360 (cadastro+rede+contratos+doacoes+SEI/PNCP+sancoes+noticias)", quando_usar: "'monte um dossie sobre X'", args: {alvo: obrigatorio}, retorno: "{path_pdf,resumo}"}
  - {id: grafo_ftm, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/grafo/ftm, status: PRONTO,
     descricao: "Exporta o Grafo de Poder no modelo FollowTheMoney (interoperar Aleph/Gephi, sem migrar)", quando_usar: "'exporte a rede de X p/ FtM/Aleph'",
     args: {alvo: obrigatorio, saltos: "int=2"}, retorno: "{entidades[FtM]}", fonte: "Grafo de Poder -> FtM (Onda 12)"}
  # ---- PROVIDERS (Onda 12: consulta hospedada sob demanda, sem baixar base; fallback+cache+proveniencia) ----
  - {id: consultar_empresa, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/empresa, status: PRONTO,
     descricao: "Cadastro + socios (QSA) por CNPJ, fonte hospedada (BrasilAPI->cnpj.pw, fallback)", quando_usar: "'dados da empresa X', socios de um CNPJ",
     args: {cnpj: obrigatorio}, retorno: "{ok,fonte,estado,obtido_em,dados:{razao_social,situacao,abertura,socios[]}}", fonte: "BrasilAPI / api.cnpj.pw (sem baixar base)"}
  - {id: consultar_idoneidade, agente: lex, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/idoneidade, status: PRONTO,
     descricao: "Triagem em listas: CEIS/CNEP (BR) + sancoes/PEP (OpenSanctions)", quando_usar: "'a empresa X esta sancionada?', PEP",
     args: {cnpj: opcional, nome: opcional}, retorno: "{resultados[{fonte,estado,dados}]}", fonte: "Portal da Transparencia + OpenSanctions"}
  - {id: consultar_ownership, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/ownership, status: PRONTO,
     descricao: "Empresa/controle internacional (LEI + relacoes)", quando_usar: "vinculo societario cross-jurisdicao", exemplo: "controle internacional da Petrobras (LEI)", args: {nome: opcional, lei: opcional}, retorno: "{ok,fonte,dados}", fonte: "GLEIF"}
  - {id: consultar_leaks, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/leaks, status: PRONTO,
     descricao: "Busca hospedada em vazamentos offshore (link MANUAL)", quando_usar: "'aparece nos Panama/Pandora Papers?'", args: {termo: obrigatorio}, retorno: "{url}", fonte: "ICIJ Offshore Leaks"}
  - {id: consultar_links, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/links, status: PRONTO,
     descricao: "Pistas de investigacao HOSPEDADA (Max Intel, OSINT-Brazuca, Bellingcat, RedeCNPJ, JusBrasil/Escavador)", quando_usar: "'onde mais pesquisar sobre X', aprofundar DD",
     args: {nome: opcional, cnpj: opcional}, retorno: "{links[{fonte,categoria,url}]}", fonte: "agregadores OSINT hospedados (uso manual)"}
  - {id: investigar_web, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/compliance/investigar, status: PRONTO,
     descricao: "PESQUISA NA WEB (DuckDuckGo + noticias) sobre pessoa/empresa: midia recente, riscos, mencoes. ESTE e o jeito de pesquisar na web — o Yoda NAO tem web_search proprio; SEMPRE use esta rota.", quando_usar: "'pesquise na web sobre X', 'noticias recentes de X', 'atividade publica/aparicoes na midia de X', 'o que saiu sobre X', monitoramento diario de uma pessoa", exemplo: "pesquise na web sobre Jorge Felippe Neto",
     args: {nome: obrigatorio, cnpj: opcional}, retorno: "{noticias[],riscos[],resumo}", fonte: "DuckDuckGo + noticias (web_research)"}
  - {id: consultar_diario, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/diario, status: PRONTO,
     descricao: "Diarios oficiais municipais (Querido Diario): busca por palavra-chave + territorio IBGE + datas", quando_usar: "'saiu no diario oficial de X?', publicacao/extrato de contrato municipal",
     args: {querystring: obrigatorio, territory_ids: "opcional (IBGE; RJ capital=3304557)", desde: opcional, ate: opcional, size: opcional}, retorno: "{total,itens[{municipio,data,url,trecho}]}", fonte: "Querido Diario (api.queridodiario.ok.org.br)"}
  - {id: doador_contrato_qsa, agente: lex, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/doador_contrato, status: PRONTO,
     descricao: "TSE doador x contrato: socios (QSA) do fornecedor que aparecem como DOADORES de campanha (RJ). Indicio a conferir, nunca acusacao (CPF mascarado -> casa por nome)", quando_usar: "'algum socio do fornecedor X financiou campanha?', conflito doador-fornecedor pela via QSA",
     args: {cnpj: obrigatorio}, retorno: "{fornecedor,n_socios,doacoes_de_socios[{socio,ano,beneficiario,partido,valor}]}", fonte: "TSE prestacao de contas (so RJ, doacao_tse) x QSA do fornecedor"}
  # ---- SEI / LICITACAO ----
  - {id: ler_processo_sei, agente: lex, dominio: juridico, tipo: cli, comando: "tools.sei_reader \"<NUMERO>\"", status: PRONTO,
     descricao: "Le processo SEI-RJ na integra via login interno itkava/ITERJ (Chromium real, SEM captcha, vence o WAF). Cache 24h.",
     quando_usar: "ler/analisar um processo SEI especifico. FORMATO do numero: 'SEI-UUUUUU/NNNNNN/AAAA' (ex.: SEI-070002/008633/2022) ou 'E-NN/NNN/AAAA' (ex.: E-12/345/2026) — unidade/sequencial/ano. Aceita com ou sem o prefixo SEI-.",
     args: {numero: "obrigatorio — nº do processo, ex.: SEI-070002/008633/2022"}, retorno: "{numero,texto,documentos[],conteudo_documentos[],cnpjs[],valores[],erro?}"}
  - {id: consultar_pncp, agente: lex, dominio: juridico, tipo: http, metodo: GET, rota: /api/pncp, status: PRONTO,
     descricao: "PNCP API publica (editais/contratos/atas/DOCS) + roda R1-R12", quando_usar: "analisar licitacao SEM SEI; editais por UF/orgao/fornecedor; preventivo (abertos)",
     args: {uf: "string=RJ", orgao: opcional, cnpj: opcional, abertos: bool}, retorno: "{contratacoes[{id_pncp,objeto,valor,docs,red_flags}]}", fonte: "pncp.gov.br API consultas (sem login)"}
  - {id: buscar_direcionamento, agente: lex, dominio: juridico, tipo: http, metodo: GET, rota: /api/sei/direcionamento, status: PRONTO,
     descricao: "Varre corpus (SEI+PNCP) e ranqueia direcionamento (R1/R7/R8/R12)", quando_usar: "'ache editais restritivos na UG X'", args: {ug: opcional, objeto: opcional}, retorno: "{processos[{ref,score,red_flags,trechos}]}"}
  - {id: parecer_juridico, agente: lex, dominio: juridico, tipo: cli, comando: "compliance_agent.lex \"<empresa|cnpj>\"", status: PRONTO,
     descricao: "Parecer R1-R12 + base TCU/TCE-RJ (grau verde/amarelo/vermelho)", quando_usar: "'tem direcionamento?', parecer", args: {alvo: obrigatorio}, retorno: "{grau_lex,path_lex,red_flags[]}"}
  - {id: busca_juridica, agente: lex, dominio: juridico, tipo: cli, comando: "compliance_agent.collectors.lexml_fetcher --termo \"<TERMO>\"", status: PRONTO,
     descricao: "Lei/acordao (TCE-RJ,TCU,LexML). RAG: Onda 10", quando_usar: "'qual a lei sobre...', jurisprudencia", args: {termo: obrigatorio}, retorno: "{resultados[]}"}
  - {id: instrumento_mandato, agente: lex, dominio: juridico, tipo: http, metodo: POST, rota: /api/mandato/minuta, status: PRONTO,
     descricao: "Minuta: requerimento(ALERJ)/representacao(TCE)/noticia de fato(MP)/post", quando_usar: "'faca um requerimento sobre esse contrato'",
     args: {tipo: "requerimento|representacao|noticia_fato|post", base: "cnpj/ug/processo/id parecer"}, retorno: "{path_docx,texto}", nota: "diligencia/representacao, nunca condenacao"}
  # ---- MERCADO (Massare) ----
  - {id: massare_cenarios, agente: massare, dominio: mercado, tipo: http, metodo: GET, rota: /api/massare/cenarios, status: PRONTO,
     descricao: "Snapshot multi-horizonte + regime + tom de noticias(Onda 8)", quando_usar: "'como esta o mercado', 'dolar/bolsa/ouro hoje'", args: {}, retorno: "{horizontes,regime_atual,tom_noticias}"}
  - {id: consultar_noticias, agente: jfn, dominio: inteligencia, tipo: http, metodo: GET, rota: /api/massare/noticias, status: PRONTO,
     descricao: "Noticias/midia sobre um tema/pessoa/empresa via GDELT (sem chave; tom/cobertura). NAO e web search generica", quando_usar: "'noticias sobre X', 'saiu algo na midia sobre X', 'aparicoes/repercussao recente de X' — quando NAO houver web_search, esta e a fonte de midia disponivel", exemplo: "noticias sobre Jorge Felippe Neto",
     args: {tema: "string (pessoa/empresa/assunto)", janela: "ex.: 2d/7d (opcional)"}, retorno: "{ok,artigos[],tom} | {ok:false,erro}"}
  - {id: massare_regime, agente: massare, dominio: mercado, tipo: http, metodo: GET, rota: /api/massare/regime, status: PRONTO,
     descricao: "Regime/clima de mercado via HMM (calmo-alta/bull, calmo-baixa/bear, estresse-alta-vol) de um ativo", quando_usar: "'qual o regime/clima do mercado?', 'estamos em bull ou bear?', 'o S&P esta em estresse?'", exemplo: "qual o regime atual do Ibovespa? e do bitcoin?",
     args: {symbol: "NOME (ibovespa, sp500, bitcoin, ouro...) OU simbolo; default ^GSPC"}, retorno: "{symbol,regime:{regime_atual,rotulo_atual,regimes[]}}"}
  - {id: massare_placar, agente: massare, dominio: mercado, tipo: http, metodo: GET, rota: /api/massare/placar, status: PRONTO,
     descricao: "Acuracia OOS + Sharpe liquido + DSR(Onda 9)", quando_usar: "'o Massare acerta?'", args: {}, retorno: "{hit_rate_oos,sharpe_liquido,dsr}"}
  - {id: massare_prever, agente: massare, dominio: mercado, tipo: http, metodo: POST, rota: /api/massare/prever, status: PRONTO,
     descricao: "Previsao direcional + estado ATUAL de um ativo (walk-forward; honesto: edge_oos/tem_skill)", quando_usar: "'como esta a prata/ouro hoje?', 'previsao do Ibovespa', 'BTC vai subir?', perspectivas de um ativo", exemplo: "como a prata esta hoje e a previsao?",
     args: {symbol: "NOME (prata, ouro, bitcoin, ibovespa, dolar, petroleo, cobre...) OU simbolo; resolve sozinho", horizon: "int=5"}, retorno: "{ativo,symbol,atual:{preco,var_pct},previsao:{direction,prob,edge_oos,tem_skill}}"}
  - {id: massare_teses, agente: massare, dominio: mercado, tipo: http, metodo: GET, rota: /api/massare/teses, status: PRONTO,
     descricao: "Teses de mercado: narrativa->ativos->direcao, com acerto OOS por narrativa", quando_usar: "'quais as teses agora', 'o que move o mercado'",
     args: {}, retorno: "{teses[{narrativa,ativos,direcao,horizonte,conf,racional,fontes,acerto_oos}]}"}
